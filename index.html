<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --bg:#f0f2f7;--white:#fff;--navy:#0c1f40;--navy2:#1a3360;
  --blue:#1a56db;--blue-t:#e8effe;
  --green:#006b41;--green-t:#e4f5ee;
  --amber:#9a4d00;--amber-t:#fef3e2;
  --red:#b51d15;--red-t:#fdecea;
  --text:#111827;--text2:#4b5668;--text3:#9ca3af;
  --border:#d1d9e8;--border-l:#e8edf5;
  --sh:0 1px 4px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --topnav-h:52px; --subtab-h:46px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;min-height:100vh;}

/* ── TOP NAV ── */
.topnav{background:var(--navy);height:var(--topnav-h);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:300;gap:0;}
.nav-brand{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;margin-right:28px;white-space:nowrap;}
.nav-brand span{color:rgba(255,255,255,.35);font-weight:400;}
.nav-sections{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav-sections::-webkit-scrollbar{display:none;}
.sec-btn{padding:6px 14px;border-radius:5px;border:none;background:none;color:rgba(255,255,255,.55);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
.sec-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.sec-btn.active{background:rgba(255,255,255,.15);color:#fff;}
.nav-date{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:rgba(255,255,255,.35);white-space:nowrap;flex-shrink:0;}

/* ── SUBTAB BAR ── */
.subtab-bar{background:var(--white);border-bottom:1px solid var(--border);height:var(--subtab-h);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--topnav-h);z-index:200;}
.subtab-bar::-webkit-scrollbar{display:none;}
.stab{padding:0 20px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s;flex-shrink:0;}
.stab:hover{background:#fafbfd;}
.stab.active{border-bottom-color:var(--navy);}
.stab-name{font-size:12px;font-weight:600;color:var(--text2);}
.stab.active .stab-name{color:var(--navy);}
.stab-sub{font-size:9.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px;}

/* ── CONTENT ── */
.content{max-width:960px;margin:0 auto;padding:22px 16px 80px;}
.sec{display:none;}.sec.active{display:block;}
.sub-panel{display:none;}.sub-panel.active{display:block;}

/* ── SHARED PANELS ── */
.panel{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:var(--sh);margin-bottom:14px;}
.panel-head{background:var(--navy);color:#fff;padding:11px 20px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.ph-name{font-size:13px;font-weight:600;}
.ph-fee{font-family:'IBM Plex Mono',monospace;font-size:10.5px;opacity:.5;}
.ph-tag{font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:rgba(255,255,255,.12);padding:2px 8px;border-radius:3px;opacity:.85;}
.grp-head{background:#f5f7fb;padding:5px 20px;font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border-l);border-top:1px solid var(--border-l);}
.og-item{display:flex;gap:10px;padding:7px 20px;border-bottom:1px solid var(--border-l);}
.og-item:last-child{border-bottom:none;}
.og-bullet{color:var(--text3);font-size:11px;margin-top:2px;flex-shrink:0;}
.og-text{font-size:12.5px;line-height:1.4;}
.og-note{font-size:10.5px;color:var(--text3);display:block;margin-top:1px;}

/* ── BENEFITS TRACKER ── */
.summary-bar{background:var(--navy2);color:#fff;padding:0 28px;height:38px;display:flex;align-items:center;gap:0;margin-bottom:20px;border-radius:6px;}
.sb-item{display:flex;align-items:baseline;gap:6px;padding:0 20px 0 0;margin-right:20px;border-right:1px solid rgba(255,255,255,.15);}
.sb-item:last-child{border-right:none;}
.sb-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.sb-label{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.07em;}
.sb-bar-wrap{flex:1;display:flex;align-items:center;gap:8px;padding-left:20px;}
.sb-track{height:4px;width:120px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.sb-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:15px 18px 13px;box-shadow:var(--sh);}
.kpi-v{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;line-height:1;margin-bottom:5px;letter-spacing:-.02em;}
.kpi-l{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);}
.kpi-s{font-size:10px;color:var(--text3);margin-top:2px;}
.kpi-bar{height:3px;border-radius:2px;margin-top:10px;background:var(--border-l);}
.kpi-bar-fill{height:100%;border-radius:2px;}
.sh{display:flex;align-items:center;gap:12px;margin:22px 0 10px;}
.sh:first-child{margin-top:0;}
.sh-label{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.sh-line{flex:1;height:1px;background:var(--border);}
.sh-sup{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--text3);}
.dq{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:var(--sh);}
.dq-head{background:var(--navy);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.dq-title{color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.dq-ct{color:rgba(255,255,255,.4);font-family:'IBM Plex Mono',monospace;font-size:10px;}
.dq-tier{border-bottom:1px solid var(--border);}
.dq-tier:last-child{border-bottom:none;}
.dq-tier-lbl{padding:5px 20px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--border-l);}
.tier-imm .dq-tier-lbl{background:var(--red-t);color:var(--red);}
.tier-mo .dq-tier-lbl{background:var(--amber-t);color:var(--amber);}
.tier-yr .dq-tier-lbl{background:var(--blue-t);color:var(--blue);}
.tier-done .dq-tier-lbl{background:#f5f7fb;color:var(--text3);}
.dq-item{display:flex;align-items:center;gap:12px;padding:9px 20px;border-bottom:1px solid var(--border-l);}
.dq-item:last-child{border-bottom:none;}
.dq-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.c-red{background:var(--red);}.c-amber{background:var(--amber);}.c-blue{background:var(--blue);}.c-green{background:var(--green);}.c-gray{background:var(--text3);}
.dq-text{flex:1;font-size:12px;font-weight:500;line-height:1.3;}
.dq-note{font-size:10.5px;color:var(--text2);display:block;margin-top:1px;font-weight:400;}
.dq-val{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.dq-val.red{color:var(--red);}.dq-val.amber{color:var(--amber);}.dq-val.blue{color:var(--blue);}.dq-val.green{color:var(--green);}.dq-val.gray{color:var(--text3);}
.anniv-row{background:#f8f9fc;padding:8px 20px;border-bottom:1px solid var(--border-l);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.anniv-row label{font-size:11px;color:var(--text2);}
.anniv-row input[type=date]{font-family:'IBM Plex Mono',monospace;font-size:11px;border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);background:var(--white);}
.bt-cols{display:grid;grid-template-columns:1fr 68px 100px 125px 88px;align-items:center;}
.bt-header{background:#f5f7fb;padding:5px 10px 5px 20px;border-bottom:1px solid var(--border);border-top:1px solid var(--border-l);}
.bt-header .bt-cell{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.bt-row{border-bottom:1px solid var(--border-l);min-height:44px;}
.bt-row:hover{background:#fafbfd;}
.bt-row:last-child{border-bottom:none;}
.bt-cell{padding:8px 10px 8px 20px;}
.bt-cell:not(:first-child){padding-left:10px;}
.bt-name{font-size:12.5px;font-weight:500;line-height:1.3;}
.bt-sub{font-size:10.5px;color:var(--text3);margin-top:2px;line-height:1.35;}
.bt-amt{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--navy);}
.bt-reset{font-size:11px;color:var(--text2);}
.st{display:flex;align-items:center;gap:5px;}
.st-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.st-txt{font-size:11px;font-weight:500;}
.st-avail .st-dot{background:var(--green);}.st-avail .st-txt{color:var(--green);}
.st-used .st-dot{background:var(--text3);}.st-used .st-txt{color:var(--text3);}
.st-warn .st-dot{background:var(--amber);}.st-warn .st-txt{color:var(--amber);}
.st-info .st-dot{background:var(--blue);}.st-info .st-txt{color:var(--blue);}
.act-btn{font-size:10.5px;padding:3px 9px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text2);font-family:'Inter',sans-serif;font-weight:500;transition:all .12s;white-space:nowrap;}
.act-btn:hover{border-color:var(--blue);color:var(--blue);}
.mt-section{padding:11px 20px 13px;border-bottom:1px solid var(--border-l);}
.mt-section:last-child{border-bottom:none;}
.mt-row{display:flex;align-items:flex-start;gap:16px;}
.mt-info{flex:1;min-width:0;}
.mt-name{font-size:12.5px;font-weight:500;}
.mt-sub{font-size:10.5px;color:var(--text3);margin-top:1px;}
.mt-dots{display:flex;gap:3px;margin-top:7px;flex-wrap:wrap;}
.m-cell{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.m-cell.future{opacity:.35;cursor:default;pointer-events:none;}
.m-box{width:20px;height:20px;border-radius:3px;border:1px solid var(--border);background:var(--white);transition:all .1s;display:flex;align-items:center;justify-content:center;}
.m-cell.used .m-box{background:var(--green);border-color:var(--green);}
.m-cell.current .m-box{border-color:var(--navy);border-width:2px;}
.m-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);}
.m-cell.used .m-lbl{color:var(--green);}
.m-chk{display:none;color:white;font-size:9px;font-weight:700;line-height:1;}
.m-cell.used .m-chk{display:block;}
.mt-stat{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-top:5px;}
.mt-right{text-align:right;flex-shrink:0;}
.mt-val{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--navy);}
.mt-rlabel{font-size:9.5px;color:var(--text3);margin-bottom:2px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.prog-section{padding:13px 20px 15px;border-bottom:1px solid var(--border-l);}
.prog-hrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
.prog-label{font-size:12.5px;font-weight:500;}
.prog-pct{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text2);}
.prog-track{height:6px;background:var(--border-l);border-radius:3px;border:1px solid var(--border);overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy2),var(--blue));border-radius:3px;transition:width .4s;}
.prog-irow{display:flex;gap:8px;align-items:center;margin-top:9px;flex-wrap:wrap;}
.prog-irow input{font-family:'IBM Plex Mono',monospace;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:4px 8px;width:116px;color:var(--text);}
.prog-irow span{font-size:11.5px;color:var(--text2);}
.prog-note{font-size:11.5px;margin-top:5px;font-weight:500;}
.chk-item{display:flex;gap:12px;align-items:flex-start;padding:9px 20px;border-bottom:1px solid var(--border-l);}
.chk-item:last-child{border-bottom:none;}
.chk-box{width:15px;height:15px;border-radius:3px;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);display:flex;align-items:center;justify-content:center;transition:all .12s;}
.chk-box.done{background:var(--green);border-color:var(--green);}
.chk-box svg{display:none;}.chk-box.done svg{display:block;}
.chk-info{flex:1;}.chk-title{font-size:12.5px;font-weight:500;}
.chk-sub{font-size:10.5px;color:var(--text2);margin-top:2px;}.chk-sub.urgent{color:var(--amber);font-weight:500;}
.chk-right{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--text3);white-space:nowrap;flex-shrink:0;margin-top:2px;}
.roi-head{display:grid;grid-template-columns:1.4fr 90px 110px 110px 80px;background:#f5f7fb;padding:6px 10px 6px 20px;border-bottom:1px solid var(--border);}
.roi-row{display:grid;grid-template-columns:1.4fr 90px 110px 110px 80px;border-bottom:1px solid var(--border-l);min-height:40px;align-items:center;}
.roi-row:last-child{border-bottom:none;}
.roi-row:hover{background:#fafbfd;}
.roi-cell{padding:8px 10px 8px 20px;font-size:12.5px;}
.roi-cell:not(:first-child){padding-left:10px;font-family:'IBM Plex Mono',monospace;}
.roi-head .roi-cell{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:0 10px 0 0;}
.roi-head .roi-cell:first-child{padding-left:0;}
.pos{color:var(--green);font-weight:600;}

/* ── GAMIFICATION ── */
.pp-rank-bar{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:11px 18px;margin-bottom:12px;box-shadow:var(--sh);display:flex;align-items:center;gap:16px;}
.rank-badge{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rank-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.rank-info{display:flex;flex-direction:column;}
.rank-name{font-size:13px;font-weight:700;letter-spacing:.03em;}
.rank-sub{font-size:10px;color:var(--text3);margin-top:1px;font-family:'IBM Plex Mono',monospace;}
.rank-progress{flex:1;display:flex;flex-direction:column;gap:5px;}
.rank-prg-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.rank-prg-track{height:6px;background:var(--border-l);border-radius:3px;border:1px solid var(--border);overflow:hidden;}
.rank-prg-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.pp-section-panel{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:12px;box-shadow:var(--sh);}
.pp-section-head{background:#f5f7fb;padding:8px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.pp-section-head span:first-child{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);}
.pp-section-head span:last-child{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);}
.achv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:0;}
.achv-card{padding:12px 14px;border-right:1px solid var(--border-l);border-bottom:1px solid var(--border-l);}
.achv-card.unlocked{background:linear-gradient(135deg,#f0faf5,#fff);}
.achv-card.locked{opacity:.4;filter:grayscale(.5);}
.achv-icon{font-size:20px;margin-bottom:5px;line-height:1;}
.achv-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.2;}
.achv-desc{font-size:9.5px;color:var(--text3);line-height:1.4;}
.achv-card.unlocked .achv-name{color:var(--green);}
.achv-stamp{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.chal-row{padding:11px 18px;border-bottom:1px solid var(--border-l);display:flex;align-items:center;gap:14px;}
.chal-row:last-child{border-bottom:none;}
.chal-info{flex:1;min-width:0;}
.chal-name{font-size:12.5px;font-weight:500;}
.chal-desc{font-size:10.5px;color:var(--text3);margin-top:1px;}
.chal-prg{width:160px;flex-shrink:0;}
.chal-prg-row{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:4px;}
.chal-prg-track{height:5px;background:var(--border-l);border-radius:3px;border:1px solid var(--border);overflow:hidden;}
.chal-prg-fill{height:100%;border-radius:3px;transition:width .4s;}
.chal-done{font-size:11px;font-weight:600;color:var(--green);font-family:'IBM Plex Mono',monospace;}
@keyframes pop-in{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.achv-card.just-unlocked{animation:pop-in .4s ease forwards;}

/* ── PASSPORT MAP & GRID ── */
.pp-stats-bar{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:13px 20px;display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;box-shadow:var(--sh);}
.pp-stat{display:flex;align-items:baseline;gap:6px;}
.pp-stat-v{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--navy);}
.pp-stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;}
.pp-stat-div{width:1px;background:var(--border);align-self:stretch;margin:0 14px;}
.pp-bar-wrap{flex:1;display:flex;align-items:center;gap:10px;min-width:80px;}
.pp-bar-track{flex:1;height:5px;background:var(--border-l);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.pp-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}
.pp-filters{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:11px 14px;margin-bottom:12px;box-shadow:var(--sh);}
.pp-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.pp-pill{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;}
.pp-pill:hover{border-color:var(--navy);color:var(--navy);}
.pp-pill.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.pp-frow{display:flex;gap:7px;flex-wrap:wrap;}
.pp-frow select,.pp-frow input{font-family:'Inter',sans-serif;font-size:11.5px;border:1px solid var(--border);border-radius:4px;padding:5px 9px;color:var(--text);background:var(--white);}
.pp-frow input{flex:1;min-width:150px;}
#pp-map{height:380px;border-radius:6px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh);}
.pp-list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.pp-list-hdr span{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;}
.pp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:9px;}
.prop-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:11px 13px;box-shadow:var(--sh);transition:border-color .12s;position:relative;}
.prop-card:hover{border-color:var(--navy2);}
.prop-card.visited{border-left:3px solid var(--green);}
.prop-card.wishlisted{border-left:3px solid #e55;}
.prop-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.prop-badge{font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;padding:2px 6px;border-radius:3px;}
.prop-stamp{font-size:14px;line-height:1;}
.prop-name{font-size:12px;font-weight:600;line-height:1.3;color:var(--text);margin-bottom:3px;}

/* ── DASHBOARD ── */

.dash-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

.dk-section{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.5;margin-bottom:6px;}
.dk-val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;line-height:1;margin-bottom:4px;}
.dk-sub{font-size:11px;opacity:.6;}
.dk-bar{height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:8px;overflow:hidden;}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
.dash-col{display:flex;flex-direction:column;gap:14px;}

.dch-title{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);}
.dch-link{font-size:10.5px;color:var(--blue);cursor:pointer;font-weight:500;}

.dash-action-row{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border-l);}

.dash-action-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.dash-action-val{font-family:'IBM Plex Mono',monospace;font-size:11px;flex-shrink:0;}
.dash-trip-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border-l);}
.dash-trip-row:last-child{border-bottom:none;}
.dash-trip-dest{font-size:12.5px;font-weight:600;flex:1;}
.dash-trip-sub{font-size:10.5px;color:var(--text3);margin-top:2px;}
.dash-trip-tag{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;flex-shrink:0;margin-top:2px;}
.tag-planning{background:var(--blue-t);color:var(--blue);}
.tag-booked{background:var(--green-t);color:var(--green);}
.tag-completed{background:#f5f7fb;color:var(--text3);}
.dash-achv-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border-l);}

.dash-achv-icon{font-size:18px;flex-shrink:0;}

.dash-achv-bar-fill{height:100%;background:var(--amber);border-radius:2px;}

/* ── TRAVEL PLANNING ── */
.travel-summary-bar{background:var(--navy2);color:#fff;padding:0 20px;height:38px;display:flex;align-items:center;gap:0;border-radius:6px;margin-bottom:18px;}
.trip-panel-head{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;background:var(--navy);border-radius:6px 6px 0 0;}

.trip-form-wrap{background:#f8f9fc;border-bottom:1px solid var(--border);padding:16px 20px;}
.trip-form-title{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}

.tf-field label{font-size:10.5px;font-weight:500;color:var(--text2);}

.tf-save:hover{background:var(--navy2);}
.tf-cancel{font-size:11.5px;padding:6px 12px;border-radius:4px;border:1px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;}
.trips-section-head{padding:8px 20px;font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);background:#f5f7fb;border-bottom:1px solid var(--border-l);border-top:1px solid var(--border-l);}
.trip-row{display:flex;align-items:flex-start;gap:14px;padding:13px 20px;border-bottom:1px solid var(--border-l);}
.trip-row:last-child{border-bottom:none;}
.trip-row:hover{background:#fafbfd;}
.trip-left{flex:1;min-width:0;}
.trip-dest{font-size:14px;font-weight:600;margin-bottom:3px;}
.trip-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}

.trip-flight{font-size:11px;color:var(--text3);}
.trip-notes{font-size:11px;color:var(--text3);margin-top:3px;font-style:italic;}
.trip-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.trip-status{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:3px;}
.s-planning{background:var(--blue-t);color:var(--blue);}
.s-booked{background:var(--green-t);color:var(--green);}
.s-completed{background:#f5f7fb;color:var(--text3);}
.trip-countdown{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--text2);}
.trip-btns{display:flex;gap:5px;}
.trip-edit-btn,.trip-del-btn{font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--white);font-family:'Inter',sans-serif;font-weight:500;}
.trip-edit-btn{color:var(--text2);}
.trip-edit-btn:hover{border-color:var(--blue);color:var(--blue);}
.trip-del-btn{color:var(--text3);}
.trip-del-btn:hover{border-color:var(--red);color:var(--red);}
.trip-empty-state{padding:40px 20px;text-align:center;color:var(--text3);}
.trip-empty-icon{font-size:32px;margin-bottom:10px;}
.trip-empty-text{font-size:13px;font-weight:500;margin-bottom:4px;}
.trip-empty-sub{font-size:11.5px;}
.calc-layout{display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:start;}
.calc-inputs{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:var(--sh);}
.calc-field{padding:12px 16px;border-bottom:1px solid var(--border-l);}
.calc-field:last-child{border-bottom:none;}
.calc-field label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
.calc-prop-search{width:100%;font-family:'Inter',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:6px 8px;color:var(--text);}
.calc-prop-list{max-height:140px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;margin-top:5px;display:none;}
.calc-prop-list.open{display:block;}
.calc-prop-opt{padding:6px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border-l);}
.calc-prop-opt:last-child{border-bottom:none;}
.calc-prop-opt:hover{background:#f5f7fb;}
.calc-prop-opt span{font-size:10px;color:var(--text3);margin-left:6px;font-family:'IBM Plex Mono',monospace;}
.calc-cat-input{width:60px;font-family:'IBM Plex Mono',monospace;font-size:14px;border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-weight:600;}
.calc-cat-row{display:flex;align-items:center;gap:8px;}
.calc-cat-name{font-size:11px;color:var(--text3);}
.nights-ctrl{display:flex;align-items:center;gap:8px;}
.nc-btn{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.nc-btn:hover{border-color:var(--navy);color:var(--navy);}
.nc-val{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;width:32px;text-align:center;}
.rate-toggles{display:flex;gap:4px;}
.rate-btn{flex:1;padding:5px 8px;border-radius:4px;border:1px solid var(--border);background:var(--white);font-size:11px;font-weight:500;cursor:pointer;color:var(--text2);text-align:center;}
.rate-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.calc-results{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:var(--sh);}
.calc-res-head{background:var(--navy);color:#fff;padding:11px 18px;}
.calc-res-title{font-size:13px;font-weight:600;}
.calc-res-prop{font-size:10.5px;opacity:.55;margin-top:2px;font-family:'IBM Plex Mono',monospace;}
.calc-res-main{padding:18px;}
.calc-pts-big{font-family:'IBM Plex Mono',monospace;font-size:36px;font-weight:600;color:var(--navy);line-height:1;}
.calc-pts-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.calc-divider{height:1px;background:var(--border-l);margin:14px 0;}
.calc-row{display:flex;align-items:baseline;justify-content:space-between;padding:4px 0;}
.calc-row-label{font-size:12px;color:var(--text2);}
.calc-row-val{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:var(--text);}
.calc-row-val.green{color:var(--green);}
.calc-row-val.amber{color:var(--amber);}
.calc-note{background:#f5f7fb;border-radius:4px;padding:8px 12px;font-size:11px;color:var(--text2);margin-top:12px;line-height:1.5;}
.calc-note.good{background:var(--green-t);color:var(--green);}
.wl-filter-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.wl-toggle{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.wl-toggle-btn{padding:5px 12px;font-size:11.5px;font-weight:500;cursor:pointer;background:var(--white);color:var(--text2);border:none;border-right:1px solid var(--border);}
.wl-toggle-btn:last-child{border-right:none;}
.wl-toggle-btn.active{background:var(--navy);color:#fff;}

/* ── UTILITIES ── */
.flash{position:fixed;bottom:18px;right:20px;background:var(--navy);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:10.5px;padding:7px 13px;border-radius:4px;opacity:0;transform:translateY(4px);transition:all .18s;pointer-events:none;z-index:999;}
.flash.show{opacity:1;transform:translateY(0);}
footer{text-align:center;color:var(--text3);font-size:9.5px;margin-top:20px;font-family:'IBM Plex Mono',monospace;line-height:1.8;}
@media(max-width:680px){
  .kpi-grid{grid-template-columns:1fr 1fr;}

  .topnav{padding:0 12px;}
  .nav-brand{margin-right:12px;}
  .nav-sections{gap:0;}
  .sec-btn{padding:4px 8px;font-size:11px;}
}
</style>
</head>
<body>

<!-- CONTENT -->
<div class="content">

      <div class="pp-stat-div"></div>
      <div class="pp-stat"><span class="pp-stat-v" id="pp-top" style="font-size:13px">—</span><span class="pp-stat-l">&nbsp;top brand</span></div>
      <div class="pp-bar-wrap"><div class="pp-bar-track"><div id="pp-bar" class="pp-bar-fill" style="width:0%"></div></div>
        <span id="pp-pct" style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3)">0%</span></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now=new Date(),CY=now.getFullYear(),CM=now.getMonth();
const KEY='benefits-v4',PKEY='passport-v1',TKEY='travel-v2';

// ── STATE ──────────────────────────────────────────────────────────────────
let S={
  resAnniv:null,hyattAnniv:null,travelCredit:null,
  editBook1:null,editBook2:null,selectHotel:null,
  diningH1:{},diningH2:{},stubhubH1:{},stubhubH2:{},
  doordash:{},lyft:{},peloton:{},
  globalEntry:null,
  appleActivated:false,ihgActivated:false,dashpassActivated:false,marriottRegistered:false,
  hyattFreeNight:null,hyattSpend:0,hyattSpendYear:CY,
};
let PS={visited:{}};
let TS={trips:[],wishlist:{}};

// ── NAVIGATION ─────────────────────────────────────────────────────────────
let activeSection='dashboard',activeTab='';
const SECTION_TABS={
  dashboard:[],
  cards:['overview','csr','hyatt-card','fu','roi'],
  passport:[],
  travel:['trips','calculator','wishlist'],
};
const TAB_META={
  overview:{name:'Overview',sub:'Decision queue'},
  csr:{name:'Sapphire Reserve',sub:'$795 / yr'},
  'hyatt-card':{name:'World of Hyatt',sub:'$95 / yr'},
  fu:{name:'Freedom Unlimited',sub:'$0 / yr'},
  roi:{name:'ROI Analysis',sub:'Fee vs. value'},
  trips:{name:'Trips',sub:'Your travel plans'},
  calculator:{name:'Points Calculator',sub:'Hyatt award chart'},
  wishlist:{name:'Wishlist',sub:'Dream properties'},
};

function setSection(section,tab){
  activeSection=section;
  document.querySelectorAll('.sec-btn').forEach(b=>b.classList.toggle('active',b.dataset.section===section));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('active',s.id==='sec-'+section));
  const tabs=SECTION_TABS[section]||[];
  const bar=document.getElementById('subtab-bar');
  if(!tabs.length){bar.style.display='none';activeTab='';}
  else{
    bar.style.display='flex';
    const t=tab||(tabs.includes(activeTab)?activeTab:tabs[0]);
    activeTab=t;
    bar.innerHTML=tabs.map(k=>`<div class="stab${k===t?' active':''}" data-tab="${k}">
      <span class="stab-name">${TAB_META[k].name}</span>
      <span class="stab-sub">${TAB_META[k].sub}</span></div>`).join('');
    bar.querySelectorAll('.stab').forEach(st=>st.onclick=()=>setTab(st.dataset.tab));
    showTab(t,section);
  }
  renderSection(section,tab);
  if(section==='passport'){setTimeout(()=>{initPMap();renderPassport();},60);}
}

function setTab(tab){
  activeTab=tab;
  document.querySelectorAll('.stab').forEach(st=>st.classList.toggle('active',st.dataset.tab===tab));
  showTab(tab,activeSection);
}
function showTab(tab,section){
  document.querySelectorAll('#sec-'+section+' .sub-panel').forEach(p=>{
    p.classList.toggle('active',p.id==='panel-'+tab);
  });
}
document.querySelectorAll('.sec-btn').forEach(b=>b.onclick=()=>setSection(b.dataset.section));

// ── STORAGE ────────────────────────────────────────────────────────────────
async function hybridGet(key){
  try{if(typeof window.storage!=='undefined'){const r=await window.storage.get(key);if(r?.value)return JSON.parse(r.value);}}catch(e){}
  try{const l=localStorage.getItem(key);if(l)return JSON.parse(l);}catch(e){}
  return null;
}
async function hybridSet(key,data){
  const j=JSON.stringify(data);
  try{if(typeof window.storage!=='undefined')await window.storage.set(key,j);}catch(e){}
  try{localStorage.setItem(key,j);}catch(e){}
}
async function load(){const d=await hybridGet(KEY);if(d)S=Object.assign({},S,d);}

// ── DATE HELPERS ──────────────────────────────────────────────────────────
function iso(){return now.toISOString().slice(0,10);}
function fmtD(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtDY(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function daysUntil(s){return Math.ceil((new Date(s+'T23:59:59')-now)/86400000);}
function mkKey(y,m){return`${y}-${String(m+1).padStart(2,'0')}`;}
function mUsed(o,y,m){return!!o[mkKey(y,m)];}

// ── BENEFIT STATUS HELPERS ─────────────────────────────────────────────────
function annivSt(anniv,usedOn){
  if(!anniv)return{cls:'st-warn',txt:'Set anniversary date'};
  const a=new Date(anniv+'T12:00:00');
  let cs=new Date(CY,a.getMonth(),a.getDate());
  if(cs>now)cs.setFullYear(CY-1);
  const ce=new Date(cs);ce.setFullYear(cs.getFullYear()+1);ce.setDate(ce.getDate()-1);
  const used=usedOn&&new Date(usedOn+'T12:00:00')>=cs;
  const ri=Math.ceil((ce-now)/86400000);
  const rl=ri<=30?`⚠ Resets in ${ri}d`:`Resets ${fmtD(ce.toISOString().slice(0,10))}`;
  return used?{cls:'st-used',txt:`Used · ${rl}`}:{cls:'st-avail',txt:`Available · ${rl}`};
}
function calYrSt(usedOn){
  const used=usedOn&&usedOn.startsWith(String(CY));
  return used?{cls:'st-used',txt:'Used · Resets Jan 1'}:{cls:'st-avail',txt:'Available · Resets Jan 1'};
}
function countSemi(obj,half){const[ms,me]=half===1?[0,5]:[6,11];let n=0;for(let m=ms;m<=me;m++)if(obj[mkKey(CY,m)])n++;return n;}
function semiSt(obj,half){
  const[ss,se]=half===1?[new Date(CY,0,1),new Date(CY,5,30)]:[new Date(CY,6,1),new Date(CY,11,31)];
  if(now<ss)return{cls:'st-info',txt:`Opens ${fmtD(ss.toISOString().slice(0,10))}`};
  const n=countSemi(obj,half);
  if(now>se)return n>0?{cls:'st-used',txt:`Closed · ${n}/6 months tracked`}:{cls:'st-used',txt:'Window closed'};
  const ri=daysUntil(se.toISOString().slice(0,10));
  const exp=ri<=14?`⚠ ${ri}d left`:`Through Dec 31`;
  return n===0?{cls:'st-avail',txt:`Available · ${exp}`}:{cls:'st-warn',txt:`${n}/6 months used · ${exp}`};
}
function fourYrSt(last){
  if(!last)return{cls:'st-avail',txt:'Available now'};
  const nx=new Date(last+'T12:00:00');nx.setFullYear(nx.getFullYear()+4);
  return nx<=now?{cls:'st-avail',txt:'Available now'}:{cls:'st-used',txt:`Next ${fmtD(nx.toISOString().slice(0,10))}`};
}

// ── CARD VALUE CALCULATOR ──────────────────────────────────────────────────
function calcVal(){
  const editDone=(calYrSt(S.editBook1).cls==='st-used'?250:0)+(calYrSt(S.editBook2).cls==='st-used'?250:0);
  const selectDone=CY===2026&&calYrSt(S.selectHotel).cls==='st-used'?250:0;
  let dd=0,ly=0,pe=0;
  for(let m=0;m<=CM;m++){if(mUsed(S.doordash,CY,m))dd+=25;if(mUsed(S.lyft,CY,m))ly+=10;if(mUsed(S.peloton,CY,m))pe+=10;}
  const tDone=S.resAnniv&&annivSt(S.resAnniv,S.travelCredit).cls==='st-used'?300:0;
  const d1=Math.round(countSemi(S.diningH1,1)/6*150),d2=Math.round(countSemi(S.diningH2,2)/6*150);
  const s1=Math.round(countSemi(S.stubhubH1,1)/6*150),s2=Math.round(countSemi(S.stubhubH2,2)/6*150);
  const hyFN=S.hyattAnniv&&annivSt(S.hyattAnniv,S.hyattFreeNight).cls==='st-used'?250:0;
  const hy2=S.hyattSpend>=15000?250:0;
  const sel=CY===2026?250:0;
  const total=300+500+sel+300+300+300+120+120+288+250+250;
  const captured=tDone+editDone+selectDone+d1+d2+s1+s2+dd+ly+pe+(S.appleActivated?288:0)+hyFN+hy2;
  return{total,captured,remaining:total-captured,pct:Math.round(captured/total*100)};
}

// ── DECISION QUEUE ─────────────────────────────────────────────────────────
function buildDQ(){
  const items=[];
  const add=(tier,dot,text,note,val,vc)=>items.push({tier,dot,text,note,val,vc});
  const h1End=new Date(CY,5,30);
  if(now<=h1End){
    const ri=daysUntil(h1End.toISOString().slice(0,10));
    if(ri<=14&&countSemi(S.diningH1,1)===0)add('imm','c-red',`Dining H1 expires in ${ri} days`,'$150 at Exclusive Tables — Jan–Jun window closing','$150 at risk','red');
    if(ri<=14&&countSemi(S.stubhubH1,1)===0)add('imm','c-red',`StubHub H1 expires in ${ri} days`,'$150 on StubHub/Viagogo — Jan–Jun window closing','$150 at risk','red');
  }
  if(!S.resAnniv||!S.hyattAnniv)add('imm','c-red','Anniversary dates not set','Status and reset dates cannot calculate without them','Required','red');
  if(!S.appleActivated)add('mo','c-amber','Activate Apple TV+ & Apple Music','One-time link in Chase app · free through Jun 22, 2027','$288/yr','amber');
  if(!S.ihgActivated)add('mo','c-amber','Activate IHG Platinum Elite Status','Link IHG account in Chase app · valid through Dec 31, 2027','Status','amber');
  if(!S.dashpassActivated)add('mo','c-amber','Activate DashPass to unlock DoorDash credits','Required to receive $25/month in DoorDash promos','$300/yr','amber');
  const mOpen=new Date(CY,6,1)<=now&&now<=new Date(CY,8,30);
  if(mOpen&&!S.marriottRegistered)add('mo','c-amber','Register for Marriott Gold Elite (window open now)','Register + 3 paid nights by Sep 30, 2026 → status through Feb 2028','Limited','amber');
  if(!mUsed(S.doordash,CY,CM))add('mo','c-amber',`DoorDash ${MONTHS[CM]} credit available`,'$5 restaurant + 2×$10 non-restaurant. Expires end of month.','$25','amber');
  if(!mUsed(S.lyft,CY,CM))add('mo','c-amber',`Lyft ${MONTHS[CM]} credit available`,'$10 in-app credit — add CSR as payment method in Lyft.','$10','amber');
  if(!mUsed(S.peloton,CY,CM))add('mo','c-amber',`Peloton ${MONTHS[CM]} credit available`,'$10 on eligible Peloton memberships. Activation required.','$10','amber');
  if(calYrSt(S.editBook1).cls!=='st-used')add('yr','c-blue','The Edit — Booking 1 available','2-night prepaid via Chase Travel. Can book for 2027 travel.','$250','blue');
  if(calYrSt(S.editBook2).cls!=='st-used')add('yr','c-blue','The Edit — Booking 2 available','Same rules. Both expire Dec 31, 2026.','$250','blue');
  if(CY===2026&&calYrSt(S.selectHotel).cls!=='st-used')add('yr','c-blue','2026 Select Hotel Credit (expires Dec 31)','IHG, Omni, Montage, Pendry, Virgin, Minor, Pan Pacific. 2-night min.','$250','blue');
  const geSt=fourYrSt(S.globalEntry);
  if(geSt.cls==='st-avail')add('yr','c-blue','Global Entry / TSA PreCheck available','Pay $120 app fee with Sapphire Reserve.','$120','blue');
  const d2n=countSemi(S.diningH2,2),s2n=countSemi(S.stubhubH2,2);
  if(now>=new Date(CY,6,1)){
    if(d2n===0)add('yr','c-blue','Dining Credit H2 open (not yet tracked)','$150 at Exclusive Tables through Dec 31.','$150','blue');
    else if(d2n<6)add('yr','c-blue',`Dining H2 partial — ${d2n}/6 months tracked`,'Continue marking months through Dec 31.','est. $'+Math.round((6-d2n)/6*150)+' left','blue');
    if(s2n===0)add('yr','c-blue','StubHub Credit H2 open (not yet tracked)','$150 on StubHub/Viagogo through Dec 31.','$150','blue');
    else if(s2n<6)add('yr','c-blue',`StubHub H2 partial — ${s2n}/6 months tracked`,'Continue marking months through Dec 31.','est. $'+Math.round((6-s2n)/6*150)+' left','blue');
  }
  if(S.hyattAnniv&&annivSt(S.hyattAnniv,S.hyattFreeNight).cls==='st-avail')add('yr','c-blue','Hyatt free night available','Category 1–4. Valid 12 months from anniversary.','~$250','blue');
  const v=calcVal();
  if(v.captured>0)add('done','c-gray',`$${v.captured.toLocaleString()} captured this cycle (${v.pct}%)`,'Benefits claimed or activated','','gray');
  return items;
}

function buildSemiTracker(container,items){
  items.forEach(([name,win,sub,obj,key,half])=>{
    const[ms,me]=half===1?[0,5]:[6,11];
    const wClosed=half===1?now>new Date(CY,5,30):now>new Date(CY,11,31);
    const wFuture=half===2&&now<new Date(CY,6,1);
    const n=countSemi(obj,half);const st=semiSt(obj,half);
    const el=half===2&&now<new Date(CY,6,1)? CM-ms+1 : wClosed ? 6 : CM-ms+1;
    const sec=document.createElement('div');sec.className='mt-section';
    sec.innerHTML=`<div class="mt-row"><div class="mt-info">
      <div style="display:flex;align-items:baseline;gap:8px"><div class="mt-name">${name}</div>
        <div style="font-size:9.5px;font-family:'IBM Plex Mono',monospace;color:var(--text3)">${win}</div></div>
      <div class="mt-sub">${sub}</div>
      <div class="mt-dots" id="sdots-${key}"></div>
      <div class="mt-stat">${wClosed?(n>0?`${n}/6 months tracked before window closed`:'Not used — window closed'):wFuture?'Window opens Jul 1':`${n} of ${Math.max(0,CM-ms+1)} elapsed months marked`}</div>

      <div style="margin-top:6px">${stHTML(st)}</div></div></div>`;

    for(let m=ms;m<=me;m++){

      const isFut=!wClosed&&(wFuture||m>CM);

      dotsEl.appendChild(cell);

  });

function buildMonthTracker(container,items){

}

let pMap=null,pMarkers=[];
let pF={region:'all',brand:'all',status:'all',search:''};

function fpProps(){
  return PROPS.filter(([id,name,brand,city,country,region])=>{
    if(pF.region!=='all'&&region!==pF.region)return false;
    if(pF.brand!=='all'&&brand!==pF.brand)return false;
    if(pF.status==='visited'&&!PS.visited[id])return false;
    if(pF.status==='unvisited'&&PS.visited[id])return false;
    if(pF.search){const q=pF.search.toLowerCase();if(!name.toLowerCase().includes(q)&&!city.toLowerCase().includes(q)&&!country.toLowerCase().includes(q))return false;}
    return true;
  });
}
function countSemiProp(obj,half){const[ms,me]=half===1?[0,5]:[6,11];let n=0;for(let m=ms;m<=me;m++)if(obj[mkKey(CY,m)])n++;return n;}
function fireConfetti(){
  const c=document.createElement('canvas');c.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(c);const ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
  const cols=['#006b41','#e3a857','#1a56db','#6b2252','#0c1f40','#c45a28'];
  const pts=Array.from({length:90},()=>({x:Math.random()*c.width,y:-12,vx:(Math.random()-.5)*7,vy:Math.random()*4+2,col:cols[Math.floor(Math.random()*cols.length)],sz:Math.random()*7+3,rot:Math.random()*360,vr:Math.random()*8-4}));
  let f=0;(function tick(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.rot+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.col;ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*.6);ctx.restore();});if(++f<130)requestAnimationFrame(tick);else c.remove();})();
}
function toggleVisit(id){
  const prev=new Set(ACHV.filter(a=>a.check(PS.visited)).map(a=>a.id));
  if(PS.visited[id])delete PS.visited[id];else PS.visited[id]=true;
  if(ACHV.some(a=>a.check(PS.visited)&&!prev.has(a.id)))setTimeout(fireConfetti,80);
  savePassport();renderPassport();
}
function initPMap(){
  if(pMap||!document.getElementById('pp-map'))return;
  pMap=L.map('pp-map',{scrollWheelZoom:false}).setView([25,15],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:18}).addTo(pMap);
  const regPills=document.getElementById('pp-pills');
  Object.entries(PREG).forEach(([k,v])=>{
    const p=document.createElement('div');p.className='pp-pill'+(k==='all'?' active':'');p.textContent=v;
    p.onclick=()=>{pF.region=k;document.querySelectorAll('.pp-pill').forEach(x=>x.classList.toggle('active',x===p));renderPassport();};
    regPills.appendChild(p);
  });
  const brandSel=document.getElementById('pp-brand');
  PBRANDS.forEach(b=>{const o=document.createElement('option');o.value=b==='All Brands'?'all':b;o.textContent=b;brandSel.appendChild(o);});
  brandSel.onchange=e=>{pF.brand=e.target.value;renderPassport();};
  document.getElementById('pp-status').onchange=e=>{pF.status=e.target.value;renderPassport();};
  let st;document.getElementById('pp-search').oninput=e=>{clearTimeout(st);st=setTimeout(()=>{pF.search=e.target.value.trim();renderPassport();},200);};
}
function updatePMarkers(){
  if(!pMap)return;
  pMarkers.forEach(m=>m.remove());pMarkers=[];
  const fp=new Set(fpProps().map(p=>p[0]));
  PROPS.forEach(([id,name,brand,city,country,region,cat,lat,lng])=>{
    const vis=!!PS.visited[id];const inF=fp.has(id);
    const m=L.circleMarker([lat,lng],{radius:vis?8:5,color:vis?'#006b41':'#0c1f40',fillColor:vis?'#006b41':'#0c1f40',fillOpacity:inF?(vis?.85:.2):.05,weight:vis?2:1,opacity:inF?1:.15});
    const bc=BC[brand]||BC['Other'];
    m.bindPopup(`<div style="font-family:'Inter',sans-serif;min-width:170px;padding:2px">
      <div style="font-size:12px;font-weight:600;color:#0c1f40;margin-bottom:3px;line-height:1.3">${name}</div>
      <div style="font-size:11px;color:#4b5668;margin-bottom:6px">${city}, ${country}</div>
      <div style="display:flex;gap:5px;margin-bottom:8px">
        <span style="font-size:9px;font-weight:700;text-transform:uppercase;color:#fff;background:${bc};padding:2px 6px;border-radius:3px">${brand}</span>
        <span style="font-size:9.5px;color:#9ca3af;border:1px solid #e8edf5;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace">Cat ${cat}</span>
      </div>
      <button onclick="toggleVisit('${id}')" style="width:100%;padding:5px 0;border-radius:4px;border:none;background:${vis?'#b51d15':'#006b41'};color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">${vis?'Remove Visit':'Mark Visited'}</button>
    </div>`,{maxWidth:220});
    m.addTo(pMap);pMarkers.push(m);
  });
}
function renderPassport(){
  const vc=Object.keys(PS.visited).length,tot=PROPS.length;
  const byReg={};PROPS.forEach(([id,,,,,region])=>{if(!byReg[region])byReg[region]={t:0,v:0};byReg[region].t++;if(PS.visited[id])byReg[region].v++;});
  const regsVis=Object.values(byReg).filter(r=>r.v>0).length;
  const ctries=new Set(PROPS.filter(([id])=>PS.visited[id]).map(p=>p[4])).size;
  const brandCts={};PROPS.forEach(([id,,brand])=>{if(PS.visited[id])brandCts[brand]=(brandCts[brand]||0)+1;});
  const top=Object.entries(brandCts).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('pp-v').textContent=vc;document.getElementById('pp-tot').textContent=tot;
  document.getElementById('pp-reg').textContent=regsVis+'/6';document.getElementById('pp-ctry').textContent=ctries||'—';
  document.getElementById('pp-top').textContent=top?top[0]+' ('+top[1]+')':'—';
  document.getElementById('pp-bar').style.width=Math.round(vc/tot*100)+'%';
  document.getElementById('pp-pct').textContent=Math.round(vc/tot*100)+'%';
  const rank=getRank(vc);const nextRank=RANKS[RANKS.indexOf(rank)+1];
  const rPct=nextRank?Math.round((vc-rank.min)/(nextRank.min-rank.min)*100):100;
  const rb=document.getElementById('pp-rank-bar');
  if(rb)rb.innerHTML=`<div class="rank-badge"><div class="rank-icon" style="background:${rank.color}20;border:2px solid ${rank.color}30">${rank.icon}</div>
    <div class="rank-info"><div class="rank-name" style="color:${rank.color}">${rank.name}</div>
      <div class="rank-sub">${nextRank?`${vc-rank.min}/${nextRank.min-rank.min} toward ${nextRank.name}`:'Max rank — Grand Master'}</div></div></div>
    <div class="rank-progress"><div class="rank-prg-label"><span style="color:${rank.color};font-weight:600">${rank.name}</span><span>${nextRank?nextRank.name+' at '+nextRank.min:'👑 Grand Master'}</span></div>
      <div class="rank-prg-track"><div class="rank-prg-fill" style="width:${rPct}%;background:${rank.color}"></div></div></div>`;
  const ag=document.getElementById('pp-achv-grid');
  if(ag){
    const unlocked=ACHV.filter(a=>a.check(PS.visited)).length;
    document.getElementById('pp-achv-ct').textContent=unlocked+'/'+ACHV.length+' unlocked';
    ag.innerHTML='';
    ACHV.forEach(a=>{const ok=a.check(PS.visited);const card=document.createElement('div');card.className='achv-card '+(ok?'unlocked':'locked');
      card.innerHTML=`<div class="achv-icon">${a.icon}</div><div class="achv-name">${a.name}</div><div class="achv-desc">${a.desc}</div>${ok?'<div class="achv-stamp">✓ Earned</div>':''}`;ag.appendChild(card);});
  }
  const ch=document.getElementById('pp-challenges');
  if(ch){ch.innerHTML='';CHALLENGES.forEach(c=>{const done=c.ids?c.ids.filter(id=>PS.visited[id]).length:(c.tally?c.tally(PS.visited):0);const total=c.ids?c.ids.length:c.target;const complete=done>=total;const cp=Math.round(done/total*100);
    const row=document.createElement('div');row.className='chal-row';
    row.innerHTML=`<div class="chal-info"><div class="chal-name">${complete?'✓ ':''}<strong>${c.name}</strong></div><div class="chal-desc">${c.desc}</div></div>
      <div class="chal-prg">${complete?'<div class="chal-done">Complete!</div>':`<div class="chal-prg-row"><span>${done}/${total}</span><span>${cp}%</span></div><div class="chal-prg-track"><div class="chal-prg-fill" style="width:${cp}%;background:${cp===100?'var(--green)':'var(--blue)'}"></div></div>`}</div>`;
    ch.appendChild(row);});}
  const fp=fpProps();document.getElementById('pp-count').textContent='Showing '+fp.length+' of '+tot+' properties';
  const grid=document.getElementById('pp-grid');grid.innerHTML='';
  if(!fp.length){grid.innerHTML='<div class="pp-empty">No properties match filters.</div>';}
  else fp.forEach(([id,name,brand,city,country,region,cat])=>{
    const vis=!!PS.visited[id];const wl=!!TS.wishlist[id];const bc=BC[brand]||BC['Other'];
    const card=document.createElement('div');card.className='prop-card'+(vis?' visited':wl?' wishlisted':'');
    card.innerHTML=`<div class="prop-top"><span class="prop-badge" style="background:${bc}">${brand}</span><span class="prop-stamp">${vis?'✓':wl?'❤️':''}</span></div>
      <div class="prop-name">${name}</div><div class="prop-loc">${city}, ${country}</div>
      <div class="prop-footer"><span class="prop-cat">Cat ${cat}</span>
        <div class="prop-actions">
          <button class="prop-btn${vis?' done':''}" onclick="toggleVisit('${id}')">${vis?'Visited':'Visit'}</button>
          ${!vis?`<button class="prop-btn${wl?' wl':' wl-add'}" onclick="toggleWishlist('${id}')">${wl?'❤️':'♡'}</button>`:''}
        </div></div>`;
    grid.appendChild(card);});
  updatePMarkers();
}
function toggleWishlist(id){
  if(TS.wishlist[id])delete TS.wishlist[id];else TS.wishlist[id]=true;

}

      </div>
    </div>
    ${!TS.trips.length?`<div class="trip-empty-state"><div class="trip-empty-icon">✈️</div><div class="trip-empty-text">No trips yet</div><div class="trip-empty-sub">Add your first trip to get started</div></div>`:''}
    ${upcoming.length?'<div class="trips-section-head">Upcoming & In Planning</div>'+upcoming.map(t=>tripRowHTML(t,today)).join(''):''}
    ${done.length?'<div class="trips-section-head">Completed</div>'+done.map(t=>tripRowHTML(t,today)).join(''):''}
  </div>`;
  if(editTripId){const t=TS.trips.find(x=>x.id===editTripId);if(t){['name','dest','start','end','status','hotel','flight','notes'].forEach(f=>{const el2=document.getElementById('tf-'+f);if(el2)el2.value=t[f]||'';});}}
}
function tripRowHTML(t,today){
  const du=daysUntil(t.startDate);
  const cd=t.startDate>=today&&t.status!=='completed'?`${du>0?du+'d away':'Today!'}`:t.status==='completed'?`Completed ${fmtD(t.endDate||t.startDate)}`:'';
  return`<div class="trip-row"><div class="trip-left">
    <div class="trip-dest">${t.destination||'Untitled Trip'}${t.name?` <span style="font-size:11px;color:var(--text3);font-weight:400">· ${t.name}</span>`:''}</div>
    <div class="trip-meta">
      <span class="trip-dates">${fmtD(t.startDate)}${t.endDate?' – '+fmtD(t.endDate):''}</span>
      ${t.hotelName?`<span class="trip-hotel">🏨 ${t.hotelName}</span>`:''}
      ${t.flightInfo?`<span class="trip-flight">✈️ ${t.flightInfo}</span>`:''}
    </div>
    ${t.notes?`<div class="trip-notes">${t.notes}</div>`:''}
  </div>
  <div class="trip-right">
    <span class="trip-status s-${t.status}">${t.status}</span>
    ${cd?`<span class="trip-countdown">${cd}</span>`:''}
    <div class="trip-btns">
      <button class="trip-edit-btn" onclick="editTrip('${t.id}')">Edit</button>
      <button class="trip-del-btn" onclick="deleteTrip('${t.id}')">Delete</button>
    </div>
  </div></div>`;
}
function openTripForm(){showTripForm=true;editTripId=null;renderTrips();}
function cancelTripForm(){showTripForm=false;editTripId=null;renderTrips();}
function editTrip(id){editTripId=id;showTripForm=true;renderTrips();}
function saveTrip(){
  const get=id=>document.getElementById(id)?.value.trim()||'';
  const trip={id:editTripId||'trip-'+Date.now(),name:get('tf-name'),destination:get('tf-dest'),startDate:get('tf-start'),endDate:get('tf-end'),status:get('tf-status')||'planning',hotelName:get('tf-hotel'),flightInfo:get('tf-flight'),notes:get('tf-notes')};
  if(!trip.destination){alert('Please enter a destination.');return;}
  if(editTripId){const idx=TS.trips.findIndex(t=>t.id===editTripId);if(idx>=0)TS.trips[idx]=trip;}else{TS.trips.push(trip);}
  showTripForm=false;editTripId=null;saveTravel();renderTrips();
}
function deleteTrip(id){if(!confirm('Delete this trip?'))return;TS.trips=TS.trips.filter(t=>t.id!==id);saveTravel();renderTrips();}

function renderCalc(){
  const el=document.getElementById('panel-calculator');
  el.innerHTML=`<div class="calc-layout">
    <div class="calc-inputs">
      <div class="grp-head" style="margin:0">Inputs</div>
      <div class="calc-field"><label>Search Property</label>
        <input class="calc-prop-search" id="calc-psearch" placeholder="Park Hyatt Tokyo…" oninput="filterCalcProps(this.value)">
        <div class="calc-prop-list" id="calc-plist"></div>
      </div>
      <div class="calc-field"><label>Category (1–8)</label>
        <div class="calc-cat-row">
          <input class="calc-cat-input" id="calc-cat" type="number" min="1" max="8" value="${calcState.cat}" oninput="calcState.cat=Math.min(8,Math.max(1,parseInt(this.value)||1));calcUpdate()">
          <span class="calc-cat-name">${['','Entry','Moderate','Standard','Select','Upper Upscale','Deluxe','Premium','Luxury'][calcState.cat]}</span>
        </div>
      </div>
      <div class="calc-field"><label>Nights</label>
        <div class="nights-ctrl">
          <button class="nc-btn" onclick="adjNights(-1)">−</button>
          <span class="nc-val" id="nc-val">${calcState.nights}</span>
          <button class="nc-btn" onclick="adjNights(1)">+</button>
        </div>
      </div>
      <div class="calc-field"><label>Rate Type</label>
        <div class="rate-toggles">
          <button class="rate-btn${calcState.rate==='lo'?' active':''}" onclick="setRate('lo')">Off-Peak</button>
          <button class="rate-btn${calcState.rate==='s'?' active':''}" onclick="setRate('s')">Standard</button>
          <button class="rate-btn${calcState.rate==='hi'?' active':''}" onclick="setRate('hi')">Peak</button>
        </div>
      </div>
    </div>
    <div class="calc-results" id="calc-results"></div>
  </div>`;
  calcUpdate();
}
function filterCalcProps(q){
  const list=document.getElementById('calc-plist');if(!list)return;
  if(!q){list.classList.remove('open');return;}
  const matches=PROPS.filter(([,name,,,city])=>name.toLowerCase().includes(q.toLowerCase())||city.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(!matches.length){list.classList.remove('open');return;}
  list.classList.add('open');
  list.innerHTML=matches.map(([id,name,brand,city,,, cat])=>{
    return '<div class="calc-prop-opt" onclick="selectCalcProp(\''+id+'\',\''+name+'\','+cat+')">'+name+'<span>Cat '+cat+' \xb7 '+city+'</span></div>';
  }).join('');
}
function selectCalcProp(id,name,cat){
  calcState.cat=cat;calcState.propName=name;
  document.getElementById('calc-psearch').value=name;
  document.getElementById('calc-plist').classList.remove('open');
  document.getElementById('calc-cat').value=cat;
  calcUpdate();
}
function adjNights(d){calcState.nights=Math.min(14,Math.max(1,calcState.nights+d));const v=document.getElementById('nc-val');if(v)v.textContent=calcState.nights;calcUpdate();}
function setRate(r){calcState.rate=r;document.querySelectorAll('.rate-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(r==='lo'?'off':r==='hi'?'peak':'stand')));calcUpdate();}
function calcUpdate(){
  const el=document.getElementById('calc-results');if(!el)return;
  const {cat,nights,rate,propName}=calcState;
  const ch=CHART[cat];if(!ch){el.innerHTML='<div style="padding:20px;color:var(--text3)">Select a valid category (1–8)</div>';return;}
  const ratePerNight=ch[rate];
  const paidNights=nights-Math.floor(nights/5);
  const totalPts=paidNights*ratePerNight;
  const ptVal=totalPts*PPT;
  const cashTotal=CASH_EST[cat]*nights;
  const savings=Math.max(0,cashTotal-ptVal);
  const savPct=Math.round(savings/cashTotal*100);
  const certElig=cat<=4;const free5th=nights>=5;
  const rateName={lo:'Off-Peak',s:'Standard',hi:'Peak'}[rate];
  el.innerHTML=`<div class="calc-res-head">
    <div class="calc-res-title">${propName||'Category '+cat+' Property'}</div>
    <div class="calc-res-prop">${rateName} rate · ${nights} night${nights>1?'s':''}</div>
  </div>
  <div class="calc-res-main">
    <div class="calc-pts-big">${totalPts.toLocaleString()}</div>
    <div class="calc-pts-sub">Hyatt points needed${free5th?` (${nights} nights, ${Math.floor(nights/5)} free — you pay ${paidNights})`:''}</div>
    <div class="calc-divider"></div>
    <div class="calc-row"><span class="calc-row-label">Hyatt points</span><span class="calc-row-val">${totalPts.toLocaleString()} pts</span></div>
    <div class="calc-row"><span class="calc-row-label">UR points (1:1 from CSR)</span><span class="calc-row-val">${totalPts.toLocaleString()} pts</span></div>
    <div class="calc-row"><span class="calc-row-label">Point value at 1.7¢/pt</span><span class="calc-row-val green">$${Math.round(ptVal).toLocaleString()}</span></div>
    <div class="calc-row"><span class="calc-row-label">Est. cash rate</span><span class="calc-row-val amber">~$${cashTotal.toLocaleString()}</span></div>
    <div class="calc-row"><span class="calc-row-label">Est. savings vs. cash</span><span class="calc-row-val green">~$${savings.toLocaleString()} (${savPct}%)</span></div>
    <div class="calc-row"><span class="calc-row-label">Rate per night</span><span class="calc-row-val">${ratePerNight.toLocaleString()} pts</span></div>
    ${free5th?`<div class="calc-note good">✓ 5th night free applied — ${Math.floor(nights/5)} free night${Math.floor(nights/5)>1?'s':''} in this booking</div>`:''}
    ${certElig?`<div class="calc-note good">✓ Your Hyatt card free night certificate covers 1 night at this category</div>`:'<div class="calc-note">Free night certificate requires Category 1–4 (this is Cat ${cat})</div>'}
  </div>`;
}

function renderWishlist(){
  const el=document.getElementById('panel-wishlist');
  const wlIds=Object.keys(TS.wishlist);
  const wlProps=PROPS.filter(([id])=>TS.wishlist[id]);
  let mode='browse';
  const render=(m)=>{
    mode=m;
    const showProps=m==='wishlist'?wlProps:PROPS.filter(([id])=>!PS.visited[id]);
    el.innerHTML=`<div class="panel">
      <div class="panel-head"><span class="ph-name">Property Wishlist</span><span class="ph-fee">${wlIds.length} saved</span><span class="ph-tag">Properties to visit next</span></div>
      <div style="padding:12px 16px;border-bottom:1px solid var(--border-l);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="wl-toggle">
          <button class="wl-toggle-btn${m==='browse'?' active':''}" onclick="wlMode('browse')">Browse Unvisited</button>
          <button class="wl-toggle-btn${m==='wishlist'?' active':''}" onclick="wlMode('wishlist')">My Wishlist (${wlIds.length})</button>
        </div>
      </div>
      <div style="padding:14px 16px 18px">
        ${!showProps.length?`<div class="pp-empty">${m==='wishlist'?'No properties wishlisted yet. Browse unvisited properties and click ♡ to save.':'All properties have been visited!'}</div>`:''}
        <div class="pp-grid" id="wl-grid"></div>
      </div>
    </div>`;
    const grid=el.querySelector('#wl-grid');
    showProps.forEach(([id,name,brand,city,country,,cat])=>{
      const wl=!!TS.wishlist[id];const bc=BC[brand]||BC['Other'];
      const card=document.createElement('div');card.className='prop-card'+(wl?' wishlisted':'');
      card.innerHTML=`<div class="prop-top"><span class="prop-badge" style="background:${bc}">${brand}</span><span class="prop-stamp">${wl?'❤️':''}</span></div>
        <div class="prop-name">${name}</div><div class="prop-loc">${city}, ${country}</div>
        <div class="prop-footer"><span class="prop-cat">Cat ${cat}</span>
          <button class="prop-btn${wl?' wl':' wl-add'}" onclick="toggleWishlistOnly('${id}')">${wl?'❤️ Saved':'♡ Wishlist'}</button>
        </div>`;
      grid.appendChild(card);
    });
  };
  window.wlMode=(m)=>render(m);
  render('browse');
}
function toggleWishlistOnly(id){if(TS.wishlist[id])delete TS.wishlist[id];else TS.wishlist[id]=true;saveTravel();renderWishlist();}

// ── RENDER DISPATCHER ──────────────────────────────────────────────────────
function renderSection(section,tab){
  if(section==='dashboard')renderDashboard();
  else if(section==='cards')renderCards();
  else if(section==='travel')renderTravel();
  // passport renders separately via initPMap/renderPassport
}

// ── INITIALIZATION ─────────────────────────────────────────────────────────
document.getElementById('nav-date').textContent=now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
async function init(){
  await Promise.all([load(),loadPassport(),loadTravel()]);
  setSection('dashboard');
}
init();
</script>
