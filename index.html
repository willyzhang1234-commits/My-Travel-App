<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --bg:#f0f2f7;--white:#fff;--navy:#0c1f40;--navy2:#1a3360;
  --blue:#1a56db;--blue-t:#e8effe;
  --green:#006b41;--green-t:#e4f5ee;
  --amber:#9a4d00;--amber-t:#fef3e2;
  --red:#b51d15;--red-t:#fdecea;
  --text:#111827;--text2:#4b5668;--text3:#9ca3af;
  --border:#d1d9e8;--border-l:#e8edf5;
  --sh:0 1px 4px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --topnav-h:52px; --subtab-h:46px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;min-height:100vh;}

/* ── TOP NAV ── */
.topnav{background:var(--navy);height:var(--topnav-h);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:300;gap:0;}
.nav-brand{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;margin-right:28px;white-space:nowrap;}
.nav-brand span{color:rgba(255,255,255,.35);font-weight:400;}
.nav-sections{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav-sections::-webkit-scrollbar{display:none;}
.sec-btn{padding:6px 14px;border-radius:5px;border:none;background:none;color:rgba(255,255,255,.55);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
.sec-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.sec-btn.active{background:rgba(255,255,255,.15);color:#fff;}
.nav-date{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:rgba(255,255,255,.35);white-space:nowrap;flex-shrink:0;}

/* ── SUBTAB BAR ── */
.subtab-bar{background:var(--white);border-bottom:1px solid var(--border);height:var(--subtab-h);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--topnav-h);z-index:200;}
.subtab-bar::-webkit-scrollbar{display:none;}
.stab{padding:0 20px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s;flex-shrink:0;}
.stab:hover{background:#fafbfd;}
.stab.active{border-bottom-color:var(--navy);}
.stab-name{font-size:12px;font-weight:600;color:var(--text2);}
.stab.active .stab-name{color:var(--navy);}
.stab-sub{font-size:9.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px;}

/* ── CONTENT ── */
.content{max-width:960px;margin:0 auto;padding:22px 16px 80px;}
.sec{display:none;}.sec.active{display:block;}
.sub-panel{display:none;}.sub-panel.active{display:block;}

/* ── SHARED PANELS ── */
.panel{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:var(--sh);margin-bottom:14px;}
.panel-head{background:var(--navy);color:#fff;padding:11px 20px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.ph-name{font-size:13px;font-weight:600;}
.ph-fee{font-family:'IBM Plex Mono',monospace;font-size:10.5px;opacity:.5;}
.ph-tag{font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:rgba(255,255,255,.12);padding:2px 8px;border-radius:3px;opacity:.85;}
.grp-head{background:#f5f7fb;padding:5px 20px;font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border-l);border-top:1px solid var(--border-l);}
details>.grp-head{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;}
details>.grp-head::after{content:'▸';font-size:10px;color:var(--text3);transition:transform .12s;}
details[open]>.grp-head::after{transform:rotate(90deg);}
details summary{list-style:none;}
details summary::-webkit-details-marker{display:none;}
.og-item{display:flex;gap:10px;padding:7px 20px;border-bottom:1px solid var(--border-l);}
.og-item:last-child{border-bottom:none;}
.og-bullet{color:var(--text3);font-size:11px;margin-top:2px;flex-shrink:0;}
.og-text{font-size:12.5px;line-height:1.4;}
.og-note{font-size:10.5px;color:var(--text3);display:block;margin-top:1px;}

/* ── BENEFITS TRACKER ── */
.summary-bar{background:var(--navy2);color:#fff;padding:0 28px;height:38px;display:flex;align-items:center;gap:0;margin-bottom:20px;border-radius:6px;}
.sb-item{display:flex;align-items:baseline;gap:6px;padding:0 20px 0 0;margin-right:20px;border-right:1px solid rgba(255,255,255,.15);}
.sb-item:last-child{border-right:none;}
.sb-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.sb-label{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.07em;}
.sb-bar-wrap{flex:1;display:flex;align-items:center;gap:8px;padding-left:20px;}
.sb-track{height:4px;width:120px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.sb-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:15px 18px 13px;box-shadow:var(--sh);}
.kpi-v{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;line-height:1;margin-bottom:5px;letter-spacing:-.02em;}
.kpi-l{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);}
.kpi-s{font-size:10px;color:var(--text3);margin-top:2px;}
.kpi-bar{height:3px;border-radius:2px;margin-top:10px;background:var(--border-l);}
.kpi-bar-fill{height:100%;border-radius:2px;}
.sh{display:flex;align-items:center;gap:12px;margin:22px 0 10px;}
.sh:first-child{margin-top:0;}
.sh-label{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.sh-line{flex:1;height:1px;background:var(--border);}
.sh-sup{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--text3);}
.dq{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:var(--sh);}
.dq-head{background:var(--navy);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.dq-title{color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.dq-ct{color:rgba(255,255,255,.4);font-family:'IBM Plex Mono',monospace;font-size:10px;}
.dq-tier{border-bottom:1px solid var(--border);}
.dq-tier:last-child{border-bottom:none;}
.dq-tier-lbl{padding:5px 20px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--border-l);}
.tier-imm .dq-tier-lbl{background:var(--red-t);color:var(--red);}
.tier-mo .dq-tier-lbl{background:var(--amber-t);color:var(--amber);}
.tier-yr .dq-tier-lbl{background:var(--blue-t);color:var(--blue);}
.tier-done .dq-tier-lbl{background:#f5f7fb;color:var(--text3);}
.dq-item{display:flex;align-items:center;gap:12px;padding:9px 20px;border-bottom:1px solid var(--border-l);}
.dq-item:last-child{border-bottom:none;}
.dq-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.c-red{background:var(--red);}.c-amber{background:var(--amber);}.c-blue{background:var(--blue);}.c-green{background:var(--green);}.c-gray{background:var(--text3);}
.dq-text{flex:1;font-size:12px;font-weight:500;line-height:1.3;}
.dq-note{font-size:10.5px;color:var(--text2);display:block;margin-top:1px;font-weight:400;}
.dq-val{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.dq-val.red{color:var(--red);}.dq-val.amber{color:var(--amber);}.dq-val.blue{color:var(--blue);}.dq-val.green{color:var(--green);}.dq-val.gray{color:var(--text3);}
.anniv-row{background:#f8f9fc;padding:8px 20px;border-bottom:1px solid var(--border-l);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.anniv-row label{font-size:11px;color:var(--text2);}
.anniv-row input[type=date]{font-family:'IBM Plex Mono',monospace;font-size:11px;border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);background:var(--white);}
.bt-cols{display:grid;grid-template-columns:1fr 68px 100px 125px 88px;align-items:center;}
.bt-header{background:#f5f7fb;padding:5px 10px 5px 20px;border-bottom:1px solid var(--border);border-top:1px solid var(--border-l);}
.bt-header .bt-cell{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.bt-row{border-bottom:1px solid var(--border-l);min-height:44px;}
.bt-row:hover{background:#fafbfd;}
.bt-row:last-child{border-bottom:none;}
.bt-cell{padding:8px 10px 8px 20px;}
.bt-cell:not(:first-child){padding-left:10px;}
.bt-name{font-size:12.5px;font-weight:500;line-height:1.3;}
.bt-sub{font-size:10.5px;color:var(--text3);margin-top:2px;line-height:1.35;}
.bt-amt{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--navy);}
.bt-reset{font-size:11px;color:var(--text2);}
.st{display:flex;align-items:center;gap:5px;}
.st-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.st-txt{font-size:11px;font-weight:500;}
.st-avail .st-dot{background:var(--green);}.st-avail .st-txt{color:var(--green);}
.st-used .st-dot{background:var(--text3);}.st-used .st-txt{color:var(--text3);}
.st-warn .st-dot{background:var(--amber);}.st-warn .st-txt{color:var(--amber);}
.st-info .st-dot{background:var(--blue);}.st-info .st-txt{color:var(--blue);}
.act-btn{font-size:10.5px;padding:3px 9px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text2);font-family:'Inter',sans-serif;font-weight:500;transition:all .12s;white-space:nowrap;}
.act-btn:hover{border-color:var(--blue);color:var(--blue);}
.mt-section{padding:11px 20px 13px;border-bottom:1px solid var(--border-l);}
.mt-section:last-child{border-bottom:none;}
.mt-row{display:flex;align-items:flex-start;gap:16px;}
.mt-info{flex:1;min-width:0;}
.mt-name{font-size:12.5px;font-weight:500;}
.mt-sub{font-size:10.5px;color:var(--text3);margin-top:1px;}
.mt-dots{display:flex;gap:3px;margin-top:7px;flex-wrap:wrap;}
.m-cell{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.m-cell.future{opacity:.35;cursor:default;pointer-events:none;}
.m-box{width:20px;height:20px;border-radius:3px;border:1px solid var(--border);background:var(--white);transition:all .1s;display:flex;align-items:center;justify-content:center;}
.m-cell.used .m-box{background:var(--green);border-color:var(--green);}
.m-cell.current .m-box{border-color:var(--navy);border-width:2px;}
.m-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);}
.m-cell.used .m-lbl{color:var(--green);}
.m-chk{display:none;color:white;font-size:9px;font-weight:700;line-height:1;}
.m-cell.used .m-chk{display:block;}
.mt-stat{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-top:5px;}
.mt-right{text-align:right;flex-shrink:0;}
.mt-val{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--navy);}
.mt-rlabel{font-size:9.5px;color:var(--text3);margin-bottom:2px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.prog-section{padding:13px 20px 15px;border-bottom:1px solid var(--border-l);}
.prog-hrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
.prog-label{font-size:12.5px;font-weight:500;}
.prog-pct{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text2);}
.prog-track{height:6px;background:var(--border-l);border-radius:3px;border:1px solid var(--border);overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy2),var(--blue));border-radius:3px;transition:width .4s;}
.prog-irow{display:flex;gap:8px;align-items:center;margin-top:9px;flex-wrap:wrap;}
.prog-irow input{font-family:'IBM Plex Mono',monospace;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:4px 8px;width:116px;color:var(--text);}
.prog-irow span{font-size:11.5px;color:var(--text2);}
.prog-note{font-size:11.5px;margin-top:5px;font-weight:500;}
.chk-item{display:flex;gap:12px;align-items:flex-start;padding:9px 20px;border-bottom:1px solid var(--border-l);}
.chk-item:last-child{border-bottom:none;}
.chk-box{width:15px;height:15px;border-radius:3px;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);display:flex;align-items:center;justify-content:center;transition:all .12s;}
.chk-box.done{background:var(--green);border-color:var(--green);}
.chk-box svg{display:none;}.chk-box.done svg{display:block;}
.chk-info{flex:1;}.chk-title{font-size:12.5px;font-weight:500;}
.chk-sub{font-size:10.5px;color:var(--text2);margin-top:2px;}.chk-sub.urgent{color:var(--amber);font-weight:500;}
.chk-right{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--text3);white-space:nowrap;flex-shrink:0;margin-top:2px;}
.roi-head{display:grid;grid-template-columns:1.4fr 90px 110px 110px 80px;background:#f5f7fb;padding:6px 10px 6px 20px;border-bottom:1px solid var(--border);}
.roi-row{display:grid;grid-template-columns:1.4fr 90px 110px 110px 80px;border-bottom:1px solid var(--border-l);min-height:40px;align-items:center;}
.roi-row:last-child{border-bottom:none;}
.roi-row:hover{background:#fafbfd;}
.roi-cell{padding:8px 10px 8px 20px;font-size:12.5px;}
.roi-cell:not(:first-child){padding-left:10px;font-family:'IBM Plex Mono',monospace;}
.roi-head .roi-cell{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:0 10px 0 0;}
.roi-head .roi-cell:first-child{padding-left:0;}
.pos{color:var(--green);font-weight:600;}

/* ── GAMIFICATION ── */
.pp-rank-bar{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:11px 18px;margin-bottom:12px;box-shadow:var(--sh);display:flex;align-items:center;gap:16px;}
.rank-badge{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rank-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.rank-info{display:flex;flex-direction:column;}
.rank-name{font-size:13px;font-weight:700;letter-spacing:.03em;}
.rank-sub{font-size:10px;color:var(--text3);margin-top:1px;font-family:'IBM Plex Mono',monospace;}
.rank-progress{flex:1;display:flex;flex-direction:column;gap:5px;}
.rank-prg-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.rank-prg-track{height:6px;background:var(--border-l);border-radius:3px;border:1px solid var(--border);overflow:hidden;}
.rank-prg-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.pp-section-panel{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:12px;box-shadow:var(--sh);}
.pp-section-head{background:#f5f7fb;padding:8px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.pp-section-head span:first-child{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);}
.pp-section-head span:last-child{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);}
.achv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:0;}
.achv-card{padding:12px 14px;border-right:1px solid var(--border-l);border-bottom:1px solid var(--border-l);}
.achv-card.unlocked{background:linear-gradient(135deg,#f0faf5,#fff);}
.achv-card.locked{opacity:.4;filter:grayscale(.5);}
.achv-icon{font-size:20px;margin-bottom:5px;line-height:1;}
.achv-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.2;}
.achv-desc{font-size:9.5px;color:var(--text3);line-height:1.4;}
.achv-card.unlocked .achv-name{color:var(--green);}
.achv-stamp{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.chal-row{padding:11px 18px;border-bottom:1px solid var(--border-l);display:flex;align-items:center;gap:14px;}
.chal-row:last-child{border-bottom:none;}
.chal-info{flex:1;min-width:0;}
.chal-name{font-size:12.5px;font-weight:500;}
.chal-desc{font-size:10.5px;color:var(--text3);margin-top:1px;}
.chal-prg{width:160px;flex-shrink:0;}
.chal-prg-row{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:4px;}
.chal-prg-track{height:5px;background:var(--border-l);border-radius:3px;border:1px solid var(--border);overflow:hidden;}
.chal-prg-fill{height:100%;border-radius:3px;transition:width .4s;}
.chal-done{font-size:11px;font-weight:600;color:var(--green);font-family:'IBM Plex Mono',monospace;}
@keyframes pop-in{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.achv-card.just-unlocked{animation:pop-in .4s ease forwards;}

/* ── PASSPORT MAP & GRID ── */
.pp-summary-collapsed{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:11px 18px;margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .12s;}
.pp-summary-collapsed:hover{border-color:var(--navy2);}
.pp-summary-detail{background:var(--white);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;box-shadow:var(--sh);overflow:hidden;}
.pp-detail-close{padding:8px 18px;background:#f5f7fb;border-bottom:1px solid var(--border);font-size:10.5px;color:var(--blue);cursor:pointer;font-weight:600;text-align:right;}
.pp-stats-bar{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:13px 20px;display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;box-shadow:var(--sh);}
.pp-stat{display:flex;align-items:baseline;gap:6px;}
.pp-stat-v{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--navy);}
.pp-stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;}
.pp-stat-div{width:1px;background:var(--border);align-self:stretch;margin:0 14px;}
.pp-bar-wrap{flex:1;display:flex;align-items:center;gap:10px;min-width:80px;}
.pp-bar-track{flex:1;height:5px;background:var(--border-l);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.pp-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}
.pp-filters{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:11px 14px;margin-bottom:12px;box-shadow:var(--sh);}
.pp-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.pp-pill{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;}
.pp-pill:hover{border-color:var(--navy);color:var(--navy);}
.pp-pill.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.pp-frow{display:flex;gap:7px;flex-wrap:wrap;}
.pp-frow select,.pp-frow input{font-family:'Inter',sans-serif;font-size:11.5px;border:1px solid var(--border);border-radius:4px;padding:5px 9px;color:var(--text);background:var(--white);}
.pp-frow input{flex:1;min-width:150px;}
#pp-map{height:380px;border-radius:6px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh);}
.pp-list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}

.trip-btns{display:flex;gap:5px;}
.trip-edit-btn,.trip-del-btn{font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--white);font-family:'Inter',sans-serif;font-weight:500;}

.trip-edit-btn:hover{border-color:var(--blue);color:var(--blue);}

.trip-empty-text{font-size:13px;font-weight:500;margin-bottom:4px;}
.trip-empty-sub{font-size:11.5px;}
.calc-layout{display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:start;}

.calc-prop-list.open{display:block;}

.calc-prop-opt:last-child{border-bottom:none;}

.calc-prop-opt span{font-size:10px;color:var(--text3);margin-left:6px;font-family:'IBM Plex Mono',monospace;}

// Migrations run in order when loaded data's schemaVersion is older than SCHEMA_VERSION.

const MIGRATIONS={
  benefits:[/* e.g. v0→v1: (d)=>{...; return d;} */],
  passport:[
    // v0→v1: visited[id] used to store `true`; now stores an ISO date string.
    // No data change needed — visitDateOf() already treats `true` as "no date recorded"
    // and every visited-check uses truthy comparison, so old `true` values keep working.
    (d)=>d,
  ],

  visa:[],
};
function migrate(kind,data){
  if(!data)return data;
  let fromV=data.schemaVersion||0;
  const list=MIGRATIONS[kind]||[];
  for(let v=fromV;v<SCHEMA_VERSION;v++){if(list[v])data=list[v](data);}
  data.schemaVersion=SCHEMA_VERSION;
  return data;
}

function setSection(section,tab){
  activeSection=section;
  document.querySelectorAll('.sec-btn').forEach(b=>b.classList.toggle('active',b.dataset.section===section));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('active',s.id==='sec-'+section));
  const tabs=SECTION_TABS[section]||[];
  const bar=document.getElementById('subtab-bar');
  if(!tabs.length){bar.style.display='none';activeTab='';}
  else{
    bar.style.display='flex';
    const t=tab||(tabs.includes(activeTab)?activeTab:tabs[0]);
    activeTab=t;
    bar.innerHTML=tabs.map(k=>`<div class="stab${k===t?' active':''}" data-tab="${k}">
      <span class="stab-name">${TAB_META[k].name}</span>
      <span class="stab-sub">${TAB_META[k].sub}</span></div>`).join('');
    bar.querySelectorAll('.stab').forEach(st=>st.onclick=()=>setTab(st.dataset.tab));
    showTab(t,section);
  }
  renderSection(section,tab);
  if(section==='passport'){setTimeout(()=>{initPMap();renderPassport();},60);}
}

function setTab(tab){
  activeTab=tab;
  document.querySelectorAll('.stab').forEach(st=>st.classList.toggle('active',st.dataset.tab===tab));
  showTab(tab,activeSection);
  renderSection(activeSection,tab);
}
function showTab(tab,section){
  document.querySelectorAll('#sec-'+section+' .sub-panel').forEach(p=>{
    p.classList.toggle('active',p.id==='panel-'+tab);
  });
}
document.querySelectorAll('.sec-btn').forEach(b=>b.onclick=()=>setSection(b.dataset.section));

// Two independent local stores (localStorage + IndexedDB) are kept in sync.
// They fail under different conditions (quota limits, private browsing rules,
// browser cleanup policies), so having both meaningfully lowers the odds of
// silent data loss. window.storage (Claude artifact host) is a third, when present.
let idbReady=null;
function openIDB(){
  if(idbReady)return idbReady;
  idbReady=new Promise((resolve)=>{
    if(!window.indexedDB){resolve(null);return;}
    const req=indexedDB.open('travel-hq-db',1);
    req.onupgradeneeded=()=>{req.result.createObjectStore('kv');};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>resolve(null);
  });
  return idbReady;
}
async function idbGet(key){
  try{
    const db=await openIDB();if(!db)return null;
    return await new Promise(res=>{
      const tx=db.transaction('kv','readonly').objectStore('kv').get(key);
      tx.onsuccess=()=>res(tx.result||null);tx.onerror=()=>res(null);
    });
  }catch(e){return null;}
}
async function idbSet(key,val){
  try{
    const db=await openIDB();if(!db)return;
    await new Promise(res=>{
      const tx=db.transaction('kv','readwrite').objectStore('kv').put(val,key);
      tx.onsuccess=()=>res();tx.onerror=()=>res();
    });
  }catch(e){}
}
async function hybridGet(key){
  try{if(typeof window.storage!=='undefined'){const r=await window.storage.get(key);if(r?.value)return JSON.parse(r.value);}}catch(e){}
  try{const l=localStorage.getItem(key);if(l)return JSON.parse(l);}catch(e){}
  const idbVal=await idbGet(key);
  if(idbVal)return typeof idbVal==='string'?JSON.parse(idbVal):idbVal;
  return null;
}
async function hybridSet(key,data){
  const j=JSON.stringify(data);
  try{if(typeof window.storage!=='undefined')await window.storage.set(key,j);}catch(e){}
  try{localStorage.setItem(key,j);}catch(e){}
  idbSet(key,j);
}

// ── BACKUP REMINDER ─────────────────────────────────────────────────────────
// Tracks unsaved-since-last-export activity so the dashboard can nudge you.
const LAST_EXPORT_KEY='travel-hq-last-export';
const CHANGE_COUNT_KEY='travel-hq-changes-since-export';
function noteChange(){
  try{
    const n=parseInt(localStorage.getItem(CHANGE_COUNT_KEY)||'0')+1;
    localStorage.setItem(CHANGE_COUNT_KEY,String(n));
  }catch(e){}
}
function getLastExport(){try{return localStorage.getItem(LAST_EXPORT_KEY);}catch(e){return null;}}
function markExported(){try{localStorage.setItem(LAST_EXPORT_KEY,iso());localStorage.setItem(CHANGE_COUNT_KEY,'0');}catch(e){}}
function backupStatus(){
  const last=getLastExport();
  const changes=parseInt((()=>{try{return localStorage.getItem(CHANGE_COUNT_KEY)||'0';}catch(e){return'0';}})());
  if(!last)return{level:changes>10?'warn':'info',text:changes>0?'Never exported — back up your data':'No backup yet — export anytime from the buttons above'};
  const days=Math.floor((now-new Date(last+'T12:00:00'))/86400000);
  if(days>=30||changes>=40)return{level:'warn',text:`Last backup ${days}d ago (${changes} changes since) — consider exporting`};
  if(days>=14||changes>=15)return{level:'info',text:`Last backup ${days}d ago (${changes} changes since)`};
  return{level:'ok',text:`Backed up ${days===0?'today':days+'d ago'}`};
}

function exportData(){
  const bundle={exportedAt:new Date().toISOString(),version:SCHEMA_VERSION,benefits:S,passport:PS,travel:TS,radha:RS,visa:VS};
  const blob=new Blob([JSON.stringify(bundle,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`travel-hq-backup-${iso()}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  markExported();
  flash();
  renderDashboard();
}
function importData(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.benefits&&!data.passport&&!data.travel&&!data.radha&&!data.visa){alert('This file doesn\'t look like a Travel HQ backup.');return;}
      if(!confirm('This will overwrite your current data with the backup file. Continue?'))return;
      if(data.benefits)S=Object.assign({},S,migrate('benefits',data.benefits));
      if(data.passport)PS=Object.assign({},PS,migrate('passport',data.passport));
      if(data.travel)TS=Object.assign({},TS,migrate('travel',data.travel));
      if(data.radha)RS=Object.assign({},RS,migrate('radha',data.radha));
      if(data.visa)VS=Object.assign({},VS,migrate('visa',data.visa));
      await Promise.all([save(),savePassport(),saveTravel(),saveRadha(),saveVisa()]);
      markExported();
      alert('Import complete.');
      setSection('dashboard');
    }catch(err){alert('Could not read that file — make sure it\'s a Travel HQ export.');}
  };
  reader.readAsText(file);
}

// ── DATE HELPERS ──────────────────────────────────────────────────────────
function iso(){return now.toISOString().slice(0,10);}
function fmtD(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtDY(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function daysUntil(s){return Math.ceil((new Date(s+'T23:59:59')-now)/86400000);}
function mkKey(y,m){return`${y}-${String(m+1).padStart(2,'0')}`;}
function mUsed(o,y,m){return!!o[mkKey(y,m)];}

// ── BENEFIT STATUS HELPERS ─────────────────────────────────────────────────
function annivSt(anniv,usedOn){
  if(!anniv)return{cls:'st-warn',txt:'Set anniversary date'};
  const a=new Date(anniv+'T12:00:00');
  let cs=new Date(CY,a.getMonth(),a.getDate());
  if(cs>now)cs.setFullYear(CY-1);
  const ce=new Date(cs);ce.setFullYear(cs.getFullYear()+1);ce.setDate(ce.getDate()-1);
  const used=usedOn&&new Date(usedOn+'T12:00:00')>=cs;
  const ri=Math.ceil((ce-now)/86400000);
  const rl=ri<=30?`⚠ Resets in ${ri}d`:`Resets ${fmtD(ce.toISOString().slice(0,10))}`;
  return used?{cls:'st-used',txt:`Used · ${rl}`}:{cls:'st-avail',txt:`Available · ${rl}`};
}
function calYrSt(usedOn){
  const used=usedOn&&usedOn.startsWith(String(CY));
  return used?{cls:'st-used',txt:'Used · Resets Jan 1'}:{cls:'st-avail',txt:'Available · Resets Jan 1'};
}
function countSemi(obj,half){const[ms,me]=half===1?[0,5]:[6,11];let n=0;for(let m=ms;m<=me;m++)if(obj[mkKey(CY,m)])n++;return n;}
function semiSt(obj,half){
  const[ss,se]=half===1?[new Date(CY,0,1),new Date(CY,5,30)]:[new Date(CY,6,1),new Date(CY,11,31)];
  if(now<ss)return{cls:'st-info',txt:`Opens ${fmtD(ss.toISOString().slice(0,10))}`};
  const n=countSemi(obj,half);
  if(now>se)return n>0?{cls:'st-used',txt:`Closed · ${n}/6 months tracked`}:{cls:'st-used',txt:'Window closed'};
  const ri=daysUntil(se.toISOString().slice(0,10));
  const exp=ri<=14?`⚠ ${ri}d left`:`Through Dec 31`;
  return n===0?{cls:'st-avail',txt:`Available · ${exp}`}:{cls:'st-warn',txt:`${n}/6 months used · ${exp}`};
}
function fourYrSt(last){
  if(!last)return{cls:'st-avail',txt:'Available now'};
  const nx=new Date(last+'T12:00:00');nx.setFullYear(nx.getFullYear()+4);
  return nx<=now?{cls:'st-avail',txt:'Available now'}:{cls:'st-used',txt:`Next ${fmtD(nx.toISOString().slice(0,10))}`};
}

// ── CARD VALUE CALCULATOR ──────────────────────────────────────────────────
function calcVal(){
  const editDone=(calYrSt(S.editBook1).cls==='st-used'?250:0)+(calYrSt(S.editBook2).cls==='st-used'?250:0);
  const selectDone=CY===2026&&calYrSt(S.selectHotel).cls==='st-used'?250:0;
  let dd=0,ly=0,pe=0;
  for(let m=0;m<=CM;m++){if(mUsed(S.doordash,CY,m))dd+=25;if(mUsed(S.lyft,CY,m))ly+=10;if(mUsed(S.peloton,CY,m))pe+=10;}
  const tDone=S.resAnniv&&annivSt(S.resAnniv,S.travelCredit).cls==='st-used'?300:0;
  const d1=Math.round(countSemi(S.diningH1,1)/6*150),d2=Math.round(countSemi(S.diningH2,2)/6*150);
  const s1=Math.round(countSemi(S.stubhubH1,1)/6*150),s2=Math.round(countSemi(S.stubhubH2,2)/6*150);
  const hyFN=S.hyattAnniv&&annivSt(S.hyattAnniv,S.hyattFreeNight).cls==='st-used'?250:0;
  const hy2=S.hyattSpend>=15000?250:0;
  const sel=CY===2026?250:0;
  const total=300+500+sel+300+300+300+120+120+288+250+250;
  const captured=tDone+editDone+selectDone+d1+d2+s1+s2+dd+ly+pe+(S.appleActivated?288:0)+hyFN+hy2;
  return{total,captured,remaining:total-captured,pct:Math.round(captured/total*100)};
}

function buildMonthTracker(container,items,stateRoot,saveFn){

    </div><div class="mt-right"><div class="mt-rlabel">Per Month</div><div class="mt-val">${amt}</div></div></div>`;

  });
}

function backupBannerHTML(){

  const c=colors[b.level];
  if(b.level==='ok')return''; // don't nag when things are fine
  return`<div style="background:${c.bg};color:${c.fg};border-radius:6px;padding:8px 16px;margin-bottom:14px;font-size:11.5px;font-weight:500;display:flex;align-items:center;justify-content:space-between">

}

    }).join('');
}

    if(pF.search){const q=pF.search.toLowerCase();if(!name.toLowerCase().includes(q)&&!city.toLowerCase().includes(q)&&!country.toLowerCase().includes(q))return false;}

  let f=0;(function tick(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.rot+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.col;ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*.6);ctx.restore();});if(++f<130)requestAnimationFrame(tick);else c.remove();})();

function affordHTML(totalPts){

      <div class="prop-name">${name}</div><div class="prop-loc">${city}, ${country}</div>
      <div class="prop-footer"><span class="prop-cat">Cat ${cat}</span>
        <button class="prop-btn${wl?' wl':' wl-add'}" onclick="toggleWishlistOnly('${id}')">${wl?'❤️ Saved':'♡ Wishlist'}</button>
      </div>`;
    grid.appendChild(card);
  });
}
function wlMode(m){wlSubMode=m;renderCollectionBody();}
function toggleWishlistOnly(id){if(TS.wishlist[id])delete TS.wishlist[id];else TS.wishlist[id]=true;saveTravel();renderCollectionBody();}

function miniCalendarHTML(){
  const events=collectDeadlines();
  const today=iso();
  const {year,month}=calView;
  const firstOfMonth=new Date(year,month,1);
  const startOffset=firstOfMonth.getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const byDay={};
  events.forEach(e=>{if(e.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)){const d=parseInt(e.date.slice(8,10));(byDay[d]=byDay[d]||[]).push(e);}});
  const monthName=new Date(year,month,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  let cells='';
  for(let i=0;i<startOffset;i++)cells+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvents=byDay[d]||[];
    const isToday=dateStr===today;
    cells+=`<div style="min-height:44px;border:1px solid var(--border-l);border-radius:4px;padding:3px 4px;${isToday?'background:#f0f4ff;border-color:var(--blue)':''}">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:${isToday?'var(--blue)':'var(--text3)'};font-weight:${isToday?700:400}">${d}</div>
      ${dayEvents.slice(0,1).map(e=>`<div style="font-size:8px;color:var(--${e.urgency==='red'?'red':e.urgency==='amber'?'amber':'blue'});margin-top:1px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.icon}</div>`).join('')}
      ${dayEvents.length>1?`<div style="font-size:7.5px;color:var(--text3)">+${dayEvents.length-1}</div>`:''}
    </div>`;
  }
  return`<div style="padding:12px 16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="calNav(-1)" style="background:#f0f2f7;border:1px solid var(--border);color:var(--text2);border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:12px">‹</button>
        <span style="font-size:12px;font-weight:600">${monthName}</span>
        <button onclick="calNav(1)" style="background:#f0f2f7;border:1px solid var(--border);color:var(--text2);border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:12px">›</button>
      </div>
      <span style="font-size:10.5px;color:var(--blue);cursor:pointer;font-weight:600" onclick="calToday()">Today</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">
      ${['S','M','T','W','T','F','S'].map(d=>`<div style="font-size:8.5px;font-weight:700;color:var(--text3);text-align:center">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells}</div>
  </div>`;
}
let calView={year:CY,month:CM};
function calNav(dir){calView.month+=dir;if(calView.month<0){calView.month=11;calView.year--;}if(calView.month>11){calView.month=0;calView.year++;}document.getElementById('dash-calendar-inline').innerHTML=miniCalendarHTML();}
function calToday(){calView={year:CY,month:CM};document.getElementById('dash-calendar-inline').innerHTML=miniCalendarHTML();}

function collectDeadlines(){
  const events=[];
  const add=(date,label,urgency,icon)=>{if(date)events.push({date,label,urgency,icon});};
  // Trips
  TS.trips.forEach(t=>{
    if(t.status!=='completed'&&t.startDate)add(t.startDate,`${t.destination||'Trip'} begins`,'blue','✈️');
  });
  // Monthly credits — deadline is last day of THIS month, only if unused this month
  const lastDayThisMonth=new Date(CY,CM+1,0).toISOString().slice(0,10);
  if(!mUsed(S.doordash,CY,CM))add(lastDayThisMonth,'DoorDash credit ($25) expires','amber','🍔');
  if(!mUsed(S.lyft,CY,CM))add(lastDayThisMonth,'Lyft credit ($10) expires','amber','🚗');
  if(!mUsed(S.peloton,CY,CM))add(lastDayThisMonth,'Peloton credit ($10) expires','amber','🚴');
  // Semi-annual windows
  const h1End=new Date(CY,5,30).toISOString().slice(0,10),h2End=new Date(CY,11,31).toISOString().slice(0,10);
  if(now<=new Date(CY,5,30)&&countSemiProp(S.diningH1,1)<6)add(h1End,'Dining Credit H1 window closes','red','🍽️');
  if(now<=new Date(CY,5,30)&&countSemiProp(S.stubhubH1,1)<6)add(h1End,'StubHub Credit H1 window closes','red','🎟️');
  if(now>new Date(CY,5,30)&&now<=new Date(CY,11,31)&&countSemiProp(S.diningH2,2)<6)add(h2End,'Dining Credit H2 window closes','amber','🍽️');
  if(now>new Date(CY,5,30)&&now<=new Date(CY,11,31)&&countSemiProp(S.stubhubH2,2)<6)add(h2End,'StubHub Credit H2 window closes','amber','🎟️');
  // Calendar-year credits
  if(calYrSt(S.editBook1).cls!=='st-used')add(h2End,'The Edit — Booking 1 expires unused','amber','🏨');
  if(calYrSt(S.editBook2).cls!=='st-used')add(h2End,'The Edit — Booking 2 expires unused','amber','🏨');
  if(CY===2026&&calYrSt(S.selectHotel).cls!=='st-used')add(h2End,'2026 Select Hotel Credit expires unused','amber','🏨');
  // Anniversary-based credits (next occurrence this year, if not yet used since anniversary)
  [[S.resAnniv,S.travelCredit,'$300 Travel Credit resets','blue','💳'],
   [S.hyattAnniv,S.hyattFreeNight,'Hyatt Free Night cert resets','blue','🌙']].forEach(([anniv,usedOn,label])=>{
    if(!anniv)return;
    const a=new Date(anniv+'T12:00:00');
    let next=new Date(CY,a.getMonth(),a.getDate());
    if(next<now)next=new Date(CY+1,a.getMonth(),a.getDate());
    add(next.toISOString().slice(0,10),label,'blue','🔄');
  });
  // Radha's cards — monthly + anniversary deadlines
  if(!mUsed(RS.goldDining,CY,CM))add(lastDayThisMonth,"Radha: Amex Gold dining credit expires",'amber','🍔');
  if(!mUsed(RS.goldUber,CY,CM))add(lastDayThisMonth,"Radha: Amex Gold Uber Cash expires",'amber','🚗');
  if(!mUsed(RS.citiLyft,CY,CM))add(lastDayThisMonth,"Radha: Citi AA Exec Lyft credit expires",'amber','🚕');
  if(!mUsed(RS.citiGrubhub,CY,CM))add(lastDayThisMonth,"Radha: Citi AA Exec Grubhub credit expires",'amber','🍔');
  if(calYrSt(RS.citiAvisBudget).cls!=='st-used')add(h2End,"Radha: Citi AA Exec Avis/Budget credit expires unused",'amber','🚙');
  [[RS.vxAnniv,RS.vxTravelCredit,"Radha: Venture X $300 travel credit resets",'blue','💳'],
   [RS.cspAnniv,RS.cspHotelCredit,"Radha: CSP $100 hotel credit resets",'blue','🏨'],
   [RS.rhyAnniv,RS.rhyFreeNight,"Radha: Hyatt free night cert resets",'blue','🌙']].forEach(([anniv,usedOn,label,urg,icon])=>{
    if(!anniv)return;
    const a=new Date(anniv+'T12:00:00');
    let next=new Date(CY,a.getMonth(),a.getDate());
    if(next<now)next=new Date(CY+1,a.getMonth(),a.getDate());
    add(next.toISOString().slice(0,10),label,urg,icon);
  });
  // Passport & visa expiries
  if(VS.passportExpiry.will)add(VS.passportExpiry.will,"Will's passport expires",'red','🛂');
  if(VS.passportExpiry.radha)add(VS.passportExpiry.radha,"Radha's passport expires",'red','🛂');
  Object.entries(VS.countries).forEach(([id,c])=>{
    if(c.status==='have-valid'&&c.expiryDate){
      const name=(VISA_COUNTRIES.find(x=>x[0]===id)||[,id])[1];
      add(c.expiryDate,`Radha's ${name} visa expires`,'amber','🛂');
    }
  });
  return events.sort((a,b)=>a.date.localeCompare(b.date));
}

// ── WHERE CAN I GO RIGHT NOW? ─────────────────────────────────────────────────
let affordState={nights:3,rate:'s',sort:'best'};
function affordCalcHTML(){
  const combined=(S.hyattPtsBalance||0)+(S.urPtsBalance||0);
  return`${balanceInputsHTML()}
    <div style="padding:14px 20px;border-bottom:1px solid var(--border-l);display:flex;gap:20px;flex-wrap:wrap;align-items:center">
      <span style="font-size:11.5px;font-weight:600;color:var(--navy2)">${combined.toLocaleString()} points on hand</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:var(--text2);font-weight:500">Nights</span>
        <button class="nc-btn" onclick="affordNights(-1)">−</button>
        <span class="nc-val" id="afford-nights-val" style="font-size:15px">${affordState.nights}</span>
        <button class="nc-btn" onclick="affordNights(1)">+</button>
      </div>
      <div class="rate-toggles" style="width:220px">
        <button class="rate-btn${affordState.rate==='lo'?' active':''}" onclick="affordRate('lo')">Off-Peak</button>
        <button class="rate-btn${affordState.rate==='s'?' active':''}" onclick="affordRate('s')">Standard</button>
        <button class="rate-btn${affordState.rate==='hi'?' active':''}" onclick="affordRate('hi')">Peak</button>
      </div>
    </div>
    <div id="afford-results"></div>`;
}
function affordNights(d){affordState.nights=Math.min(14,Math.max(1,affordState.nights+d));document.getElementById('afford-nights-val').textContent=affordState.nights;affordUpdate();}
function affordRate(r){affordState.rate=r;document.querySelectorAll('#calc-mode-body .rate-btn').forEach(b=>{if(['Off-Peak','Standard','Peak'].includes(b.textContent))b.classList.toggle('active',b.textContent.toLowerCase().includes(r==='lo'?'off':r==='hi'?'peak':'stand'));});affordUpdate();}
function affordUpdate(){
  const resEl=document.getElementById('afford-results');if(!resEl)return;
  const combined=(S.hyattPtsBalance||0)+(S.urPtsBalance||0);
  const {nights,rate}=affordState;
  const paidNights=nights-Math.floor(nights/5);
  if(!combined){resEl.innerHTML='<div class="pp-empty">Add your Hyatt and UR balances above to see what you can afford.</div>';return;}
  const scored=PROPS.map(p=>{
    const cat=p[6];const cost=CHART[cat][rate]*paidNights;
    return{p,cost,afford:cost<=combined};
  });
  const affordable=scored.filter(s=>s.afford);
  const sorted=[...affordable].sort((a,b)=>affordState.sort==='best'?b.p[6]-a.p[6]:a.cost-b.cost);
  const cheapestOutOfReach=scored.filter(s=>!s.afford).sort((a,b)=>a.cost-b.cost)[0];
  resEl.innerHTML=`
    <div style="padding:10px 20px;background:#f5f7fb;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span style="font-size:12px;font-weight:600;color:var(--navy)">${affordable.length} of ${PROPS.length} properties affordable for ${nights} night${nights>1?'s':''}</span>
      <div class="rate-toggles" style="width:180px">
        <button class="rate-btn${affordState.sort==='best'?' active':''}" onclick="affordSort('best')">Best First</button>
        <button class="rate-btn${affordState.sort==='cheap'?' active':''}" onclick="affordSort('cheap')">Cheapest First</button>
      </div>
    </div>
    ${cheapestOutOfReach?`<div style="padding:10px 20px;background:var(--amber-t);color:var(--amber);font-size:11.5px">
      Almost there: <strong>${cheapestOutOfReach.p[1]}</strong> (Cat ${cheapestOutOfReach.p[6]}) needs just ${(cheapestOutOfReach.cost-combined).toLocaleString()} more points.
    </div>`:''}
    <div class="pp-grid" style="padding:14px 20px" id="afford-grid"></div>`;
  const grid=document.getElementById('afford-grid');
  if(!sorted.length){grid.innerHTML='<div class="pp-empty">Nothing affordable yet at this length of stay — try fewer nights or Off-Peak rate.</div>';return;}
  sorted.forEach(({p,cost})=>{
    const[id,name,brand,city,country,,cat]=p;
    const bc=BC[brand]||BC['Other'];
    const card=document.createElement('div');card.className='prop-card';
    card.innerHTML=`<div class="prop-top"><span class="prop-badge" style="background:${bc}">${brand}</span></div>
      <div class="prop-name">${name}</div><div class="prop-loc">${city}, ${country}</div>
      <div class="prop-footer"><span class="prop-cat">Cat ${cat}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--green)">${cost.toLocaleString()} pts</span></div>`;
    grid.appendChild(card);
  });
}
function affordSort(s){affordState.sort=s;affordUpdate();}

// ── REDEMPTION HALL OF FAME ───────────────────────────────────────────────────
let showRedForm=false;
function cpp(r){return r.points>0?(r.cashValue/r.points*100):0;}
function renderHOFBody(body){
  const reds=[...TS.redemptions].sort((a,b)=>cpp(b)-cpp(a));
  const avgCpp=reds.length?reds.reduce((s,r)=>s+cpp(r),0)/reds.length:0;
  const totalPtsUsed=reds.reduce((s,r)=>s+r.points,0);
  const totalCashVal=reds.reduce((s,r)=>s+r.cashValue,0);
  body.innerHTML=`
    <div class="trip-panel-head" style="border-radius:0">
      <div class="tph-left"><div class="tph-title">Redemption Hall of Fame</div><div class="tph-ct">${reds.length} logged · avg ${avgCpp.toFixed(2)}¢/pt</div></div>
      <button class="new-trip-btn" onclick="openRedForm()" style="background:var(--navy);color:#fff">+ Log Redemption</button>
    </div>
    <div id="red-form-wrap" style="display:${showRedForm?'block':'none'}">
      <div class="trip-form-wrap">
        <div class="trip-form-title">Log a Redemption</div>
        <div class="tf-grid">
          <div class="tf-field"><label>Property</label>
            <input id="rf-prop" list="hyatt-prop-list" placeholder="Park Hyatt Tokyo" oninput="redPropHint(this.value)">
          </div>
          <div class="tf-field"><label>Date</label><input type="date" id="rf-date" value="${iso()}"></div>
          <div class="tf-field"><label>Nights</label><input type="number" id="rf-nights" min="1" value="1"></div>
          <div class="tf-field"><label>Points Paid</label><input type="number" id="rf-points" min="0" placeholder="30000"></div>
          <div class="tf-field"><label>Cash Rate You Avoided</label><input type="number" id="rf-cash" min="0" placeholder="950"></div>
        </div>
        <div class="tf-field"><label>Notes</label><input id="rf-notes" placeholder="Suite upgrade, anniversary trip, etc."></div>
        <div id="rf-hint" style="font-size:11px;color:var(--text3);margin:4px 0"></div>
        <div class="tf-actions"><button class="tf-save" onclick="saveRedemption()">Save</button><button class="tf-cancel" onclick="cancelRedForm()">Cancel</button></div>
      </div>
    </div>
    ${!reds.length?`<div class="trip-empty-state"><div class="trip-empty-icon">🏆</div><div class="trip-empty-text">No redemptions logged yet</div><div class="trip-empty-sub">Log your award stays to see your best-ever value per point</div></div>`:`
    <div class="kpi-grid" style="padding:14px 20px 0">
      <div class="kpi"><div class="kpi-v" style="color:var(--green)">${avgCpp.toFixed(2)}¢</div><div class="kpi-l">Avg Value / Point</div></div>
      <div class="kpi"><div class="kpi-v">${totalPtsUsed.toLocaleString()}</div><div class="kpi-l">Total Points Redeemed</div></div>
      <div class="kpi"><div class="kpi-v" style="color:var(--navy2)">$${totalCashVal.toLocaleString()}</div><div class="kpi-l">Total Cash Value Captured</div></div>
    </div>
    <div class="grp-head">Ranked by Value per Point</div>
    ${reds.map((r,i)=>{
      const c=cpp(r);const isTop=i===0;
      return`<div class="dq-item" style="${isTop?'background:linear-gradient(90deg,#fff9ec,transparent)':''}">
        <div style="width:20px;text-align:center;font-weight:700;color:${isTop?'#c9962a':'var(--text3)'};font-family:'IBM Plex Mono',monospace;font-size:12px">${isTop?'🥇':'#'+(i+1)}</div>
        <div class="dq-text">${r.propName}<span class="dq-note">${fmtDY(r.date)} · ${r.nights} night${r.nights>1?'s':''} · ${r.points.toLocaleString()} pts for $${r.cashValue.toLocaleString()}${r.notes?' · '+r.notes:''}</span></div>
        <div class="dq-val green">${c.toFixed(2)}¢/pt</div>
        <button class="trip-del-btn" style="margin-left:8px" onclick="deleteRedemption('${r.id}')">✕</button>

}
function redPropHint(val){
  const hint=document.getElementById('rf-hint');if(!hint)return;
  const match=PROPS.find(([,name])=>name.toLowerCase()===val.toLowerCase());
  if(!match){hint.textContent='';return;}
  const cat=match[6];
  hint.textContent=`Cat ${cat} · Hyatt standard rate ~${CHART[cat].s.toLocaleString()} pts/night · est. cash ~$${CASH_EST[cat]}/night`;
}
function openRedForm(){showRedForm=true;renderCollectionBody();}
function cancelRedForm(){showRedForm=false;renderCollectionBody();}
function saveRedemption(){
  const get=id=>document.getElementById(id)?.value.trim()||'';
  const propName=get('rf-prop'),points=parseInt(get('rf-points'))||0,cashValue=parseInt(get('rf-cash'))||0;
  if(!propName||!points||!cashValue){alert('Please fill in property, points paid, and cash value.');return;}
  TS.redemptions.push({id:'red-'+Date.now(),propName,date:get('rf-date')||iso(),nights:parseInt(get('rf-nights'))||1,points,cashValue,notes:get('rf-notes')});
  showRedForm=false;saveTravel();renderCollectionBody();
}
function deleteRedemption(id){if(!confirm('Delete this redemption?'))return;TS.redemptions=TS.redemptions.filter(r=>r.id!==id);saveTravel();renderCollectionBody();}



// ── ERROR CONTAINMENT ────────────────────────────────────────────────────────
// A bug in one section's render function should not blank the whole app.
// safeRender catches it, shows a visible message in that section only, and
// logs the real error to the console for debugging.
function safeRender(label,fn){
  try{fn();}
  catch(err){
    console.error(`[Travel HQ] Error rendering ${label}:`,err);
    const targets={dashboard:'dash-content',cards:'panel-overview',travel:'panel-trips',passport:'pp-grid'};
    const elId=targets[label];
    const el=elId&&document.getElementById(elId);
    if(el)el.innerHTML=`<div style="background:var(--red-t);color:var(--red);border-radius:6px;padding:16px 20px;font-size:12.5px;line-height:1.6">
      <strong>This section hit an error and couldn't render.</strong><br>
      Your saved data is untouched — try another tab, or reload the page. If it persists, open the browser console (F12) for details, or export your data as a precaution.<br>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;opacity:.75">${(err&&err.message)||err}</span>
    </div>`;
  }
}
window.onerror=function(msg,src,line,col,err){
  console.error('[Travel HQ] Uncaught error:',msg,'at',src+':'+line);
  const existing=document.getElementById('global-err-banner');
  if(existing)return true;
  const banner=document.createElement('div');
  banner.id='global-err-banner';
  banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#b51d15;color:#fff;padding:10px 16px;font-family:Inter,sans-serif;font-size:12px;z-index:9998;display:flex;justify-content:space-between;align-items:center;gap:12px';
  banner.innerHTML=`<span>Something broke in the app (${msg}). Your saved data should be fine — try reloading, or export a backup first if you're able to.</span>
    <span style="cursor:pointer;font-weight:600;flex-shrink:0" onclick="this.parentElement.remove()">Dismiss ✕</span>`;
  document.body.appendChild(banner);
  return true; // prevents the default blank-page browser error behavior
};

// ── RENDER DISPATCHER ──────────────────────────────────────────────────────
function renderSection(section,tab){
  if(section==='dashboard')safeRender('dashboard',renderDashboard);
  else if(section==='cards')safeRender('cards',renderCards);
  else if(section==='travel')safeRender('travel',renderTravel);
  // passport renders separately via initPMap/renderPassport
}

// ── INITIALIZATION ─────────────────────────────────────────────────────────
document.getElementById('nav-date').textContent=now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
async function init(){
  const dl=document.getElementById('hyatt-prop-list');
  if(dl)dl.innerHTML=PROPS.map(([id,name])=>`<option value="${name}">`).join('');
  try{
    await Promise.all([load(),loadPassport(),loadTravel(),loadRadha(),loadVisa()]);
  }catch(err){
    console.error('[Travel HQ] Failed to load saved data:',err);
    alert('There was a problem loading your saved data. Starting with a blank state — your backup file (if you have one) can restore it via Import.');
  }
  setSection('dashboard');
}
init();
